async function siguienteFolio(){
  var anio=new Date().getFullYear();
  var claveAnio=FOLIO_KEY+"-"+anio;
  // Leer contador actual
  var n=1;
  try{
    var local=localStorage.getItem(claveAnio);
    if(local)n=parseInt(local)||1;
    // Intentar leer de Firebase para tener el mas actualizado
    var r=await fetch(FB_URL+"/"+claveAnio+".json",{signal:AbortSignal.timeout(3000)});
    if(r.ok){var rv=await r.json();if(rv&&parseInt(rv)>n)n=parseInt(rv);}
  }catch(e){}
  var folio="PROD-"+anio+"-"+String(n).padStart(4,"0");
  var siguiente=n+1;
  // Guardar el siguiente numero
  try{localStorage.setItem(claveAnio,String(siguiente));}catch(e){}
  fetch(FB_URL+"/"+claveAnio+".json",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(siguiente)}).catch(function(){});
  return folio;
}

function esDuplicado(datos,folio){
  var dup=false;
  Object.keys(datos||{}).forEach(function(p){
    ((datos[p]&&datos[p].registros)||[]).forEach(function(r){
      if(r.folio===folio)dup=true;
    });
  });
  return dup;
}

// Contar registros totales en datos
function contarRegs(d){
  if(!d||typeof d!=="object")return 0;
  var n=0;
  Object.keys(d).forEach(function(k){
    var v=d[k];
    if(v&&Array.isArray(v.registros))n+=v.registros.length;
    if(v&&Array.isArray(v.inventario))n+=v.inventario.length;
  });
  return n;
}

async function fbGet(key){
  // Cargar local primero
  var local=null;
  try{ var lv=localStorage.getItem(key); if(lv)local=JSON.parse(lv); }catch(e){}
  // Intentar Firebase
  var remote=null;
  try{
    var r=await fetch(FB_URL+"/"+key+".json",{signal:AbortSignal.timeout(5000)});
    if(r.ok)remote=await r.json();
  }catch(e){}
  // Usar el que tenga MAS datos (protege cambios offline)
  if(!remote&&!local)return null;
  if(!remote)return local;
  if(!local)return remote;
  var nLocal=contarRegs(local);var nRemote=contarRegs(remote);
  // Si hay pendientes locales o local tiene mas datos, usar local y sincronizar
  var pending=localStorage.getItem(key+"_pending");
  if(pending||nLocal>nRemote){
    // Subir local a Firebase en background
    fetch(FB_URL+"/"+key+".json",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(local)})
      .then(function(){localStorage.removeItem(key+"_pending");}).catch(function(){});
    return local;
  }
  return remote;
}

async function fbSet(key,value){
  // 1. Guardar en localStorage SIEMPRE (inmediato, sin internet)
  try{ localStorage.setItem(key,JSON.stringify(value)); }catch(e){}
  // 2. Intentar Firebase
  var ok=false;
  try{
    var r=await fetch(FB_URL+"/"+key+".json",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(value),signal:AbortSignal.timeout(8000)});
    ok=r.ok;
  }catch(e){}
  // 3. Si fallo Firebase, marcar como pendiente
  if(!ok){
    try{ localStorage.setItem(key+"_pending","1"); }catch(e){}
  } else {
    try{ localStorage.removeItem(key+"_pending"); }catch(e){}
  }
  return ok;
}

function hoy(){

}
function horaActual(){
  var n=new Date();
  return n.getHours().toString().padStart(2,"0")+":"+n.getMinutes().toString().padStart(2,"0");
}
function diasDesde(fecha){
  try{
    var parts=fecha.split("/"); var d=parseInt(parts[0]); var m=parseInt(parts[1]); var y=parseInt(parts[2]);
    return Math.floor((new Date()-new Date(y,m-1,d))/86400000);
  }catch(e){ return 0; }
}

function fechaLocalISO(){
  var d=new Date();var m=d.getMonth()+1;var dd=d.getDate();

}

function PedsCerrados(props){

        // Calcular cajas hechas: coincidir por cliente Y presentacion si existe

          if(ped.presentacion&&r.presentacion&&r.presentacion!==ped.presentacion)return false;
          return true;

        var cajasHechas=regsMatch.reduce(function(s,r){return s+(parseInt(r.cajas)||0);},0);
        var pedCajas=parseInt(ped.cajas)||1;
        var pct=Math.min(100,Math.round(cajasHechas/pedCajas*100));
        var completo=cajasHechas>=pedCajas;
        var isAbierto=abierto===ped.id;
        // Desglose por rancho+malla

        regsMatch.forEach(function(r){
          var k=(r.rancho||"?")+"/M"+(r.malla||"?");

          desglose[k]+=(parseInt(r.cajas)||0);
        });
        return (
          <div key={ped.id} style={{marginBottom:8}}>
            <div onClick={function(){setAbierto(isAbierto?null:ped.id);}}
              style={{background:"rgba(0,0,0,0.25)",border:"1px solid "+(isAbierto?col+"44":"rgba(255,255,255,0.07)"),borderRadius:isAbierto?"8px 8px 0 0":"8px",padding:"10px 12px",cursor:"pointer"}}>

                <div style={{fontSize:13,fontWeight:700,color:"#ffffff"}}>{ped.cliente}</div>

              </div>
              {ped.presentacion&&<div style={{fontSize:12,color:"#b0bec5",marginBottom:5}}>{ped.presentacion}</div>}

                <div style={{height:"100%",width:pct+"%",background:completo?"#22c55e":col,borderRadius:4}}/>

                </div>
              );})}
              {(cfg.clientes_extra||[]).length===0&&<div style={{fontSize:11,color:"#333"}}>Sin clientes extra agregados</div>}
            </div>
          </div>

          {/* PRESENTACIONES POR PRODUCTO */}
          <div>
            <div style={{fontSize:9,fontWeight:900,letterSpacing:2,color:"rgba(167,139,250,0.6)",marginBottom:8,textTransform:"uppercase"}}>Presentaciones extra para {cfgProd}</div>
            <div style={{display:"flex",gap:8,marginBottom:10}}>
              <input type="text" placeholder="Ej: 40lb, 15ct, 6x1..." value={nuevoPct}
                onChange={function(e){setNuevoPct(e.target.value);}}
                onKeyDown={function(e){if(e.key==="Enter"&&nuevoPct.trim()){
                  var n=nuevoPct.trim();
                  var pe=Object.assign({},cfg.pcts_extra||{});
                  var lista=(pe[cfgProd]||[]).slice();
                  if(lista.indexOf(n)<0){lista.push(n);}
                  pe[cfgProd]=lista;
                  var nc=Object.assign({},cfg,{pcts_extra:pe});
                  setCfg(nc);fbSet(CFG_KEY,nc);setNuevoPct("");
                }}}
                style={{flex:1,background:"rgba(0,0,0,0.4)",border:"2px solid rgba(167,139,250,0.3)",borderRadius:8,padding:"9px 12px",color:"#e8eaf0",fontFamily:"system-ui",fontSize:14,outline:"none"}}/>
              <button onClick={function(){
                var n=nuevoPct.trim();if(!n)return;
                var pe=Object.assign({},cfg.pcts_extra||{});
                var lista=(pe[cfgProd]||[]).slice();
                if(lista.indexOf(n)<0){lista.push(n);}
                pe[cfgProd]=lista;
                var nc=Object.assign({},cfg,{pcts_extra:pe});
                setCfg(nc);fbSet(CFG_KEY,nc);setNuevoPct("");
              }} style={{padding:"9px 16px",background:"rgba(167,139,250,0.2)",border:"2px solid rgba(167,139,250,0.4)",borderRadius:8,color:"#a78bfa",fontFamily:"system-ui",fontSize:14,fontWeight:900,cursor:"pointer"}}>+</button>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {((cfg.pcts_extra&&cfg.pcts_extra[cfgProd])||[]).map(function(p){return(
                <div key={p} style={{display:"flex",alignItems:"center",gap:4,padding:"4px 10px",background:"rgba(167,139,250,0.1)",border:"1px solid rgba(167,139,250,0.3)",borderRadius:20}}>
                  <span style={{fontSize:12,color:"#a78bfa",fontWeight:700}}>{p}</span>
                  <button onClick={function(){
                    var pe=Object.assign({},cfg.pcts_extra||{});
                    pe[cfgProd]=(pe[cfgProd]||[]).filter(function(x){return x!==p;});
                    var nc=Object.assign({},cfg,{pcts_extra:pe});
                    setCfg(nc);fbSet(CFG_KEY,nc);
                  }} style={{background:"none",border:"none",color:"rgba(239,68,68,0.7)",fontSize:14,cursor:"pointer",fontFamily:"system-ui",padding:"0 2px",lineHeight:1}}>x</button>
                </div>
              );})}
              {((cfg.pcts_extra&&cfg.pcts_extra[cfgProd])||[]).length===0&&<div style={{fontSize:11,color:"#333"}}>Sin presentaciones extra para {cfgProd}</div>}
            </div>
          </div>

          <div style={{marginTop:18,fontSize:9,color:"#333",textAlign:"center"}}>Los cambios se guardan en Firebase y aplican de inmediato en todos los dispositivos</div>
        </div>
      </div>
    )}

    {modalPin&&(
      <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.92)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
        <div style={{background:"#0f1f14",border:"2px solid rgba(34,197,94,0.4)",borderRadius:16,padding:"28px 24px",maxWidth:300,width:"100%",textAlign:"center"}}>
          <div style={{fontSize:18,fontWeight:900,color:"#f0ede8",marginBottom:6}}>Acceso de editor</div>
          <div style={{fontSize:12,color:"#8899aa",marginBottom:20}}>Ingresa el PIN para registrar y modificar</div>
          <input type="number" value={pinInput} onChange={function(e){setPinInput(e.target.value.slice(0,4));setPinError(false);}} placeholder="0000" style={{width:"100%",background:"rgba(0,0,0,0.5)",border:"2px solid "+(pinError?"#ef4444":"rgba(34,197,94,0.3)"),borderRadius:10,padding:"14px",color:"#22c55e",fontFamily:"monospace",fontSize:32,textAlign:"center",outline:"none",marginBottom:10}}/>
          {pinError&&<div style={{fontSize:12,color:"#ef4444",marginBottom:8,fontWeight:700}}>PIN incorrecto</div>}
          <div style={{display:"flex",gap:8,marginTop:10}}>
            <button onClick={function(){setModalPin(false);setAccionPendiente(null);setPinInput("");}} style={{flex:1,padding:"12px",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#8899aa",fontSize:13,cursor:"pointer",fontFamily:"system-ui"}}>Cancelar</button>
            <button onClick={confirmarPin} style={{flex:1,padding:"12px",background:"rgba(34,197,94,0.2)",border:"1px solid rgba(34,197,94,0.5)",borderRadius:8,color:"#22c55e",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"system-ui"}}>Entrar</button>
          </div>
        </div>
      </div>
    )}

    {/* MODAL EDITAR / BORRAR REGISTRO */}
    {editReg&&(
      <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.92)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
        <div style={{background:"#0a1628",border:"2px solid rgba(96,165,250,0.4)",borderRadius:14,padding:"20px",maxWidth:420,width:"100%",maxHeight:"90vh",overflowY:"auto"}}>
          {!editAuth?(
            <div>
              <div style={{fontSize:15,fontWeight:900,color:"#60a5fa",marginBottom:6}}>{editReg._borrar?"Borrar registro":"Editar registro"}</div>
              <div style={{fontSize:11,color:"#4a6a7a",marginBottom:16}}>Ingresa el PIN maestro para continuar</div>
              <input type="password" placeholder="PIN" value={editPin}
                onChange={function(e){setEditPin(e.target.value);setEditPinErr(false);}}
                onKeyDown={function(e){if(e.key==="Enter"){if(editPin===PIN_PROD){setEditAuth(true);}else{setEditPinErr(true);setEditPin("");}}}}
                style={{width:"100%",background:"rgba(0,0,0,0.4)",border:"2px solid "+(editPinErr?"rgba(239,68,68,0.5)":"rgba(96,165,250,0.3)"),borderRadius:9,padding:"12px",color:"#fff",fontFamily:"system-ui",fontSize:20,fontWeight:800,textAlign:"center",outline:"none",marginBottom:editPinErr?6:12}}/>
              {editPinErr&&<div style={{fontSize:11,color:"#ef4444",marginBottom:10,textAlign:"center"}}>PIN incorrecto</div>}
              <div style={{display:"flex",gap:10}}>
                <button onClick={function(){setEditReg(null);setEditPin("");setEditPinErr(false);}} style={{flex:1,padding:"11px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:9,color:"#6b7280",fontFamily:"system-ui",fontSize:13,fontWeight:700,cursor:"pointer"}}>Cancelar</button>
                <button onClick={function(){if(editPin===PIN_PROD){setEditAuth(true);}else{setEditPinErr(true);setEditPin("");}}} style={{flex:2,padding:"11px",background:"rgba(96,165,250,0.15)",border:"2px solid rgba(96,165,250,0.4)",borderRadius:9,color:"#60a5fa",fontFamily:"system-ui",fontSize:14,fontWeight:900,cursor:"pointer"}}>Confirmar PIN</button>
              </div>
            </div>
          ):editReg._borrar?(
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:15,fontWeight:900,color:"#ef4444",marginBottom:8}}>Borrar este registro</div>
              <div style={{fontSize:12,color:"#6b7280",marginBottom:16}}>{editReg.cajas} cajas . {editReg.cliente} . {editReg.presentacion} . {editReg.calidad}</div>
              <div style={{display:"flex",gap:10}}>
                <button onClick={function(){setEditReg(null);setEditAuth(false);}} style={{flex:1,padding:"12px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:9,color:"#6b7280",fontFamily:"system-ui",fontSize:13,fontWeight:700,cursor:"pointer"}}>Cancelar</button>
                <button onClick={function(){
                  var prodN=editReg._prod;var regId=editReg.id;
                  var nd=Object.assign({},datos);
                  nd[prodN]=Object.assign({},datos[prodN],{registros:datos[prodN].registros.filter(function(x){return x.id!==regId;})});
                  guardar(nd);setEditReg(null);setEditAuth(false);
                }} style={{flex:2,padding:"12px",background:"rgba(239,68,68,0.15)",border:"2px solid rgba(239,68,68,0.4)",borderRadius:9,color:"#ef4444",fontFamily:"system-ui",fontSize:14,fontWeight:900,cursor:"pointer"}}>Confirmar borrar</button>
              </div>
            </div>
          ):(
            <div>
              <div style={{fontSize:15,fontWeight:900,color:"#60a5fa",marginBottom:14}}>Editar registro</div>
              {[["fecha","Fecha"],["cliente","Cliente"],["calidad","Calidad"],["subcalidad","Subcalidad"],["presentacion","Presentacion"],["tamano","Tamano"],["rancho","Rancho"],["malla","Malla"],["linea","Linea"],["cajas","Cajas"],["hora","Hora"]].map(function(pair){
                var campo=pair[0];var lbl2=pair[1];
                return(
                  <div key={campo} style={{marginBottom:10}}>
                    <label style={{display:"block",fontSize:9,fontWeight:800,letterSpacing:1.5,color:"#4a6a7a",marginBottom:4,textTransform:"uppercase"}}>{lbl2}</label>
                    <input value={editReg[campo]||""} onChange={function(e){var upd=Object.assign({},editReg);upd[campo]=e.target.value;setEditReg(upd);}}
                      type={campo==="cajas"?"number":campo==="fecha"?"date":campo==="hora"?"time":"text"}
                      style={{width:"100%",background:"rgba(0,0,0,0.4)",border:"2px solid rgba(96,165,250,0.25)",borderRadius:8,padding:"8px 10px",color:"#e8eaf0",fontFamily:"system-ui",fontSize:14,fontWeight:700,outline:"none"}}/>
                  </div>
                );
              })}
              <div style={{display:"flex",gap:10,marginTop:14}}>
                <button onClick={function(){setEditReg(null);setEditAuth(false);}} style={{flex:1,padding:"11px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:9,color:"#6b7280",fontFamily:"system-ui",fontSize:13,fontWeight:700,cursor:"pointer"}}>Cancelar</button>
                <button onClick={function(){
                  var prodN=editReg._prod;var updReg=editReg;
                  var nd=Object.assign({},datos);
                  nd[prodN]=Object.assign({},datos[prodN],{registros:datos[prodN].registros.map(function(r){return r.id===updReg.id?Object.assign({},r,updReg):r;})});
                  guardar(nd);setEditReg(null);setEditAuth(false);
                }} style={{flex:2,padding:"11px",background:"rgba(96,165,250,0.15)",border:"2px solid rgba(96,165,250,0.4)",borderRadius:9,color:"#60a5fa",fontFamily:"system-ui",fontSize:14,fontWeight:900,cursor:"pointer"}}>Guardar cambios</button>
              </div>
            </div>
          )}
        </div>
      </div>
    )}

    </div>
    </div>

    {/* MODAL JALAR DEL INVENTARIO AL PEDIDO */}
    {jalarPed&&(
      <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.93)",zIndex:9999,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:12,overflowY:"auto"}}>
        <div style={{background:"#0a1a12",border:"2px solid rgba(74,222,128,0.4)",borderRadius:14,padding:"18px",maxWidth:460,width:"100%",marginTop:20}}>
          <div style={{fontSize:15,fontWeight:900,color:"#4ade80",marginBottom:4}}>Jalar del inventario</div>
          <div style={{fontSize:12,color:"#4a6a7a",marginBottom:4}}>Pedido: <span style={{color:"#fff",fontWeight:700}}>{jalarPed.cliente}</span>{jalarPed.presentacion?" . "+jalarPed.presentacion:""} . {jalarPed.cajas} cajas</div>
          <div style={{fontSize:11,color:"#4a6a7a",marginBottom:14}}>Selecciona los pallets del inventario que ya estan hechos para este pedido:</div>
          {(inventario||[]).length===0
            ?<div style={{fontSize:12,color:"#555",marginBottom:14}}>Sin inventario disponible</div>
            :(inventario||[]).map(function(r){
              var rSnap=r;
              var sel=selJalar.indexOf(rSnap.id)>=0;
              return(
                <div key={rSnap.id} onClick={function(){
                  if(sel){setSelJalar(selJalar.filter(function(x){return x!==rSnap.id;}));}
                  else{setSelJalar(selJalar.concat([rSnap.id]));}
                }} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",marginBottom:6,background:sel?"rgba(74,222,128,0.1)":"rgba(0,0,0,0.3)",border:"2px solid "+(sel?"rgba(74,222,128,0.5)":"rgba(255,255,255,0.07)"),borderRadius:9,cursor:"pointer"}}>
                  <div style={{width:20,height:20,borderRadius:5,border:"2px solid "+(sel?"#4ade80":"rgba(255,255,255,0.2)"),background:sel?"#4ade80":"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {sel&&<span style={{color:"#000",fontSize:12,fontWeight:900,lineHeight:1}}>v</span>}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#fff"}}>{rSnap.calidad}{rSnap.subcalidad?" / "+rSnap.subcalidad:""}{rSnap.presentacion?" - "+rSnap.presentacion:""}</div>
                    <div style={{fontSize:11,color:"#8899aa"}}>{rSnap.cliente||"Sin cliente"} . {rSnap.rancho} . M{rSnap.malla} . {rSnap.fechaInventario||rSnap.fecha||""}</div>
                  </div>
                  <div style={{fontSize:18,fontWeight:900,color:sel?"#4ade80":"#8899aa",fontFamily:"Georgia,serif"}}>{rSnap.cajas}</div>
                </div>
              );
            })
          }
          {selJalar.length>0&&(
            <div style={{background:"rgba(74,222,128,0.08)",border:"1px solid rgba(74,222,128,0.2)",borderRadius:8,padding:"8px 12px",marginBottom:12,display:"flex",justifyContent:"space-between"}}>
              <span style={{fontSize:12,color:"#4ade80",fontWeight:700}}>Seleccionados: {selJalar.length} pallets</span>
              <span style={{fontSize:12,color:"#4ade80",fontWeight:900}}>{(inventario||[]).filter(function(r){return selJalar.indexOf(r.id)>=0;}).reduce(function(s,r){return s+(parseInt(r.cajas)||0);},0)} cajas</span>
            </div>
          )}
          <div style={{display:"flex",gap:8,marginTop:8}}>
            <button onClick={function(){setJalarPed(null);setSelJalar([]);}}
              style={{flex:1,padding:"10px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#6b7280",fontFamily:"system-ui",fontSize:13,fontWeight:700,cursor:"pointer"}}>Cancelar</button>
            <button disabled={selJalar.length===0} onClick={function(){
              if(selJalar.length===0)return;
              requerirPin(function(){
                var pedSnap=jalarPed;var selSnap=selJalar;
                var nd=Object.assign({},datos);var pN=prod;
                var invActual=(nd[pN]&&nd[pN].inventario)||[];
                var regActual=(nd[pN]&&nd[pN].registros)||[];
                var jalados=invActual.filter(function(r){return selSnap.indexOf(r.id)>=0;});
                var nuevoInv=invActual.filter(function(r){return selSnap.indexOf(r.id)<0;});
                var nuevosRegs=jalados.map(function(r){return Object.assign({},r,{cliente:pedSnap.cliente,presentacion:pedSnap.presentacion||r.presentacion,_jalado:true,_pedidoOrigen:pedSnap.id});});
                nd[pN]=Object.assign({},nd[pN],{inventario:nuevoInv,registros:regActual.concat(nuevosRegs)});
                guardar(nd);
                setJalarPed(null);setSelJalar([]);
              });
            }} style={{flex:2,padding:"10px",background:selJalar.length>0?"rgba(74,222,128,0.18)":"rgba(255,255,255,0.03)",border:"2px solid "+(selJalar.length>0?"rgba(74,222,128,0.5)":"rgba(255,255,255,0.08)"),borderRadius:8,color:selJalar.length>0?"#4ade80":"#555",fontFamily:"system-ui",fontSize:13,fontWeight:900,cursor:selJalar.length>0?"pointer":"default"}}>
              Aplicar al pedido ({selJalar.length} seleccionados)
            </button>
          </div>
        </div>
      </div>
    )}

    {/* MODAL DESCONTAR INVENTARIO DE PEDIDO */}
    {itemDescontar&&(
      <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.92)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
        <div style={{background:"#0a1628",border:"2px solid rgba(96,165,250,0.4)",borderRadius:14,padding:"20px",maxWidth:420,width:"100%",maxHeight:"90vh",overflowY:"auto"}}>
          <div style={{fontSize:15,fontWeight:900,color:"#60a5fa",marginBottom:4}}>Descontar del pedido</div>
          <div style={{fontSize:12,color:"#4a6a7a",marginBottom:14}}>
            {itemDescontar.cajas} cajas en inventario . {itemDescontar.rancho} . M{itemDescontar.malla}
          </div>
          <div style={{fontSize:11,color:"#8899aa",marginBottom:10}}>Selecciona el pedido activo a descontar:</div>
          {(pedidosActivos||[]).length===0
            ?<div style={{fontSize:12,color:"#555",marginBottom:14}}>Sin pedidos activos para este producto</div>
            :(pedidosActivos||[]).map(function(ped){
              var cajasPed=parseInt(ped.cajas)||0;
              return(
                <div key={ped.id} style={{background:"rgba(0,0,0,0.3)",border:"1px solid rgba(96,165,250,0.2)",borderRadius:9,padding:"10px 12px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:700,color:"#fff"}}>{ped.cliente}</div>
                    <div style={{fontSize:11,color:"#8899aa"}}>{ped.presentacion} . {cajasPed} cajas</div>
                  </div>
                  <button onClick={function(){
                    var iSnap=itemDescontar;var pedSnap=ped;
                    requerirPin(function(){
                      // Mover item de inventario a registros con cliente del pedido
                      var nd=Object.assign({},datos);
                      var pN=prod;
                      var invActual=(nd[pN]&&nd[pN].inventario)||[];
                      var regActual=(nd[pN]&&nd[pN].registros)||[];
                      // Quitar del inventario
                      nd[pN]=Object.assign({},nd[pN],{
                        inventario:invActual.filter(function(x){return x.id!==iSnap.id;}),
                        registros:regActual.concat([Object.assign({},iSnap,{cliente:pedSnap.cliente,presentacion:pedSnap.presentacion||iSnap.presentacion,_descontadoPedido:pedSnap.id})])
                      });
                      guardar(nd);
                      setItemDescontar(null);
                    });
                  }} style={{padding:"7px 14px",background:"rgba(96,165,250,0.15)",border:"2px solid rgba(96,165,250,0.4)",borderRadius:8,color:"#60a5fa",fontFamily:"system-ui",fontSize:12,fontWeight:900,cursor:"pointer"}}>Descontar</button>
                </div>
              );
            })
          }
          <button onClick={function(){setItemDescontar(null);}}
            style={{width:"100%",padding:"10px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#6b7280",fontFamily:"system-ui",fontSize:13,fontWeight:700,cursor:"pointer",marginTop:8}}>Cancelar</button>
        </div>
      </div>
    )}

    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
