<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produccion | Parras Valley</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif; background: #08120a; color: #f0ede8; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: rgba(74,222,128,0.3); border-radius: 3px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;


var PRODUCTOS = ["Persa","Slicer","Europeo","Morron","Minibel"];
var RANCHOS = ["PVT","Cordillera","Forrajera"];
var LINEAS_PROC = ["Persa","Slicer","Europeo","Morron","Minibel"];
var DIAS_ALARMA = 3;
var FB_URL = "https://parrasvalley-default-rtdb.firebaseio.com";
var PROD_KEY = "produccion-v1";
var HIST_KEY = "produccion-hist-v1";
var PED_KEY  = "pedidos-v1";

var CLIENTES = {
  Persa:   ["Sin cliente","Mama Mia","Lakeway","DQP","Wholesum","4 Earth","Perfresh","Nature Sweet","Pero Family","Produce Team","Custom Pack"],
  Slicer:  ["Sin cliente","Mama Mia","Lakeway","DQP","Wholesum","4 Earth","Perfresh","Nature Sweet","Pero Family","Produce Team","Custom Pack"],
  Europeo: ["Sin cliente","Mama Mia","Lakeway","DQP","Wholesum","4 Earth","Perfresh","Nature Sweet","Pero Family","Produce Team","Custom Pack"],
  Morron:  ["Sin cliente","Wholesum","Pero Family","Perfresh"],
  Minibel: ["Sin cliente","Natura Suite","Pero Family","Perfresh"],
};

// Flujo: Presentacion -> Calidad -> SubCalidad (si aplica)
var FLUJO_PERSA = [
  { pct:"20lb",  cals:[{cal:"Primera",subs:["FCY","XF"]},{cal:"Segunda",subs:["ML","MS"]},{cal:"Tercera",subs:["Choice"]}] },
  { pct:"12x1",  cals:[{cal:"Primera",subs:null},{cal:"Segunda",subs:null}] },
  { pct:"8x2",   cals:[{cal:"Primera",subs:null},{cal:"Segunda",subs:null}] },
];

var FLUJO_OTROS = {
  Slicer:  { cals:[{cal:"Super",subs:null},{cal:"Selecto",subs:null},{cal:"Plain",subs:null}], pcts:["18ct","24ct","36ct","25lb","50lb"], extraPcts:{Lakeway:["62 piezas","Small"]} },
  Europeo: { cals:[{cal:"Primera",subs:null},{cal:"Segunda",subs:null},{cal:"Bushel",subs:null}], pcts:["12ct","24ct","1/9 bushel"], tams:{"12ct":["Small","Mediano"],"24ct":["Small","Mediano"]} },
  Morron:  { cals:[{cal:"Primera",subs:null},{cal:"Choice",subs:null}], pcts:{"Primera":["11lb","12x2"],"Choice":["1/9 bushel"]} },
  Minibel: { cals:[{cal:"Primera",subs:null},{cal:"Segunda",subs:null}], pcts:{"Primera":["12x1","12x8oz"],"Segunda":["10lb","15lb","20lb"]} },
};

var COLORES = {Persa:"#22c55e",Slicer:"#3b82f6",Europeo:"#a78bfa",Morron:"#f59e0b",Minibel:"#f43f5e"};

async function fbGet(key){
  try{
    var r = await fetch(FB_URL+"/"+key+".json");
    if(!r.ok) return null;
    return await r.json();
  }catch(e){
    try{ var v=localStorage.getItem(key); return v?JSON.parse(v):null; }catch(e2){ return null; }
  }
}
async function fbSet(key,value){
  try{ await fetch(FB_URL+"/"+key+".json",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(value)}); }catch(e){}
  try{ localStorage.setItem(key,JSON.stringify(value)); }catch(e){}
}

function hoy(){
  return new Date().toLocaleDateString("es-MX",{day:"2-digit",month:"2-digit",year:"numeric"});
}
function horaActual(){
  var n=new Date();
  return n.getHours().toString().padStart(2,"0")+":"+n.getMinutes().toString().padStart(2,"0");
}
function diasDesde(fecha){
  try{
    var parts=fecha.split("/"); var d=parseInt(parts[0]); var m=parseInt(parts[1]); var y=parseInt(parts[2]);
    return Math.floor((new Date()-new Date(y,m-1,d))/86400000);
  }catch(e){ return 0; }
}
function initDatos(){
  var o={};
  PRODUCTOS.forEach(function(p){ o[p]={registros:[],inventario:[]}; });
  return o;
}

function initForm(prod){
  return {producto:prod||"Persa",presentacion:"",calidad:"",subcalidad:"",tamano:"",cliente:"",rancho:"PVT",malla:"",linea:"Persa",cajas:"",hora:horaActual()};
}

function MiniPedido(props){
  var ped=props.ped; var reg=props.reg; var col=props.col;
  var cajasP=reg.filter(function(r){return r.cliente===ped.cliente;}).reduce(function(s,r){return s+(parseInt(r.cajas)||0);},0);
  var total=parseInt(ped.cajas)||1;
  var pct=Math.min(100,Math.round(cajasP/total*100));
  return (
    <div style={{marginTop:8}}>
      <div style={{fontSize:11,color:"#8899aa",marginBottom:3}}>{ped.cliente} - {ped.cajas} cajas</div>
      <div style={{height:6,background:"rgba(255,255,255,0.07)",borderRadius:3,overflow:"hidden",marginBottom:2}}>
        <div style={{height:"100%",width:pct+"%",background:pct>=100?"#22c55e":col,borderRadius:3}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:8}}>
        <span style={{color:"#22c55e"}}>{cajasP} ({pct}%)</span>
        <span style={{color:"#ef4444"}}>Faltan {Math.max(0,total-cajasP)}</span>
      </div>
    </div>
  );
}

function App(){
  var stateHist = useState(false); var vistaHist=stateHist[0]; var setVistaHist=stateHist[1];
  var stateProd = useState(null); var prod=stateProd[0]; var setProd=stateProd[1];
  var stateDatos = useState(initDatos()); var datos=stateDatos[0]; var setDatos=stateDatos[1];
  var stateHist2 = useState([]); var historial=stateHist2[0]; var setHistorial=stateHist2[1];
  var statePed = useState({}); var pedidos=statePed[0]; var setPedidos=statePed[1];
  var stateLoad = useState(true); var loading=stateLoad[0]; var setLoading=stateLoad[1];
  var stateTab = useState("registro"); var tab=stateTab[0]; var setTab=stateTab[1];
  var stateForm = useState(null); var form=stateForm[0]; var setForm=stateForm[1];
  var stateBaja = useState(null); var modalBaja=stateBaja[0]; var setModalBaja=stateBaja[1];
  var stateMot = useState("Reproceso"); var motivoBaja=stateMot[0]; var setMotivoBaja=stateMot[1];
  var stateRep = useState(""); var presentacionReproceso=stateRep[0]; var setPresentacionReproceso=stateRep[1];
  var stateMP = useState(false); var modalPedido=stateMP[0]; var setModalPedido=stateMP[1];
  var stateFP = useState(null); var formPedido=stateFP[0]; var setFormPedido=stateFP[1];
  var stateCC = useState(false); var confirmCerrar=stateCC[0]; var setConfirmCerrar=stateCC[1];
  var stateCBH = useState(false); var confirmBorrarHist=stateCBH[0]; var setConfirmBorrarHist=stateCBH[1];
  var stateCerrarPed = useState(null); var confirmCerrarPed=stateCerrarPed[0]; var setConfirmCerrarPed=stateCerrarPed[1];
  var stateErrForm = useState([]); var erroresForm=stateErrForm[0]; var setErroresForm=stateErrForm[1];
  var stateModoSel = useState(false); var modoSeleccion=stateModoSel[0]; var setModoSeleccion=stateModoSel[1];
  var stateSeleccion = useState([]); var seleccionados=stateSeleccion[0]; var setSeleccionados=stateSeleccion[1];
  var stateModalBajaMulti = useState(false); var modalBajaMulti=stateModalBajaMulti[0]; var setModalBajaMulti=stateModalBajaMulti[1];
  var stateMotivoBajaMulti = useState("Merma"); var motivoBajaMulti=stateMotivoBajaMulti[0]; var setMotivoBajaMulti=stateMotivoBajaMulti[1];
  var stateRepMulti = useState(""); var presentacionReprocesoMulti=stateRepMulti[0]; var setPresentacionReprocesoMulti=stateRepMulti[1];
  var stateModoSelInv = useState(false); var modoSeleccionInv=stateModoSelInv[0]; var setModoSeleccionInv=stateModoSelInv[1];
  var stateSelInv = useState([]); var seleccionadosInv=stateSelInv[0]; var setSeleccionadosInv=stateSelInv[1];
  var stateModalBajaInv = useState(false); var modalBajaInv=stateModalBajaInv[0]; var setModalBajaInv=stateModalBajaInv[1];
  var stateMotivoBajaInv = useState("Merma"); var motivoBajaInv=stateMotivoBajaInv[0]; var setMotivoBajaInv=stateMotivoBajaInv[1];
  var stateRepInv = useState(""); var presentacionReprocesoInv=stateRepInv[0]; var setPresentacionReprocesoInv=stateRepInv[1];
  var statePedCerrados = useState({}); var pedidosCerrados=statePedCerrados[0]; var setPedidosCerrados=statePedCerrados[1];
  var PED_CERR_KEY="pedidos-cerrados-v1";
  var stateFC = useState(""); var filtroCliente=stateFC[0]; var setFiltroCliente=stateFC[1];
  var stateFR = useState(""); var filtroRancho=stateFR[0]; var setFiltroRancho=stateFR[1];
  var stateFM = useState(""); var filtroMalla=stateFM[0]; var setFiltroMalla=stateFM[1];

  var darBajaMultipleInventario = async function(producto){
    if(!seleccionadosInv.length) return;
    var nuevo2={}; Object.keys(datos).forEach(function(k){nuevo2[k]=datos[k];});
    var linea2={
      registros:(datos[producto]&&datos[producto].registros)||[],
      inventario:(datos[producto]&&datos[producto].inventario)||[]
    };
    // Si es reproceso agregar nuevos items
    if(motivoBajaInv==="Reproceso"&&presentacionReprocesoInv){
      seleccionadosInv.forEach(function(id){
        var item=linea2.inventario.filter(function(r){return r.id===id;})[0];
        if(item){
          var repro={}; Object.keys(item).forEach(function(k){repro[k]=item[k];});
          repro.id=Date.now()+Math.random(); repro.presentacion=presentacionReprocesoInv;
          repro.fechaInventario=hoy(); repro.esReproceso=true;
          linea2.inventario=[repro].concat(linea2.inventario);
        }
      });
    }
    // Quitar los seleccionados del inventario
    linea2.inventario=linea2.inventario.filter(function(r){return seleccionadosInv.indexOf(r.id)===-1;});
    nuevo2[producto]=linea2;
    await guardar(nuevo2);
    setSeleccionadosInv([]); setModoSeleccionInv(false); setModalBajaInv(false);
    setMotivoBajaInv("Merma"); setPresentacionReprocesoInv("");
  };

  var darBajaMultiple = async function(producto){
    if(!seleccionados.length) return;
    var nuevo2={}; Object.keys(datos).forEach(function(k){nuevo2[k]=datos[k];});
    var linea2={
      registros:(datos[producto]&&datos[producto].registros)||[],
      inventario:(datos[producto]&&datos[producto].inventario)||[]
    };
    // Marcar registros seleccionados como bajados
    linea2.registros=linea2.registros.map(function(r){
      if(seleccionados.indexOf(r.id)===-1) return r;
      var n={}; Object.keys(r).forEach(function(k){n[k]=r[k];});
      n.bajado=true; n.motivoBaja=motivoBajaMulti;
      if(motivoBajaMulti==="Reproceso"&&presentacionReprocesoMulti) n.reprocesadoComo=presentacionReprocesoMulti;
      return n;
    });
    // Si es reproceso, agregar al inventario con nueva presentacion
    if(motivoBajaMulti==="Reproceso"&&presentacionReprocesoMulti){
      seleccionados.forEach(function(id){
        var item=linea2.registros.filter(function(r){return r.id===id;})[0];
        if(item){
          var repro={}; Object.keys(item).forEach(function(k){repro[k]=item[k];});
          repro.id=Date.now()+Math.random(); repro.presentacion=presentacionReprocesoMulti;
          repro.fechaInventario=hoy(); repro.esReproceso=true; repro.bajado=false;
          linea2.inventario=[repro].concat(linea2.inventario);
        }
      });
    }
    nuevo2[producto]=linea2;
    await guardar(nuevo2);
    setSeleccionados([]); setModoSeleccion(false); setModalBajaMulti(false);
    setMotivoBajaMulti("Merma"); setPresentacionReprocesoMulti("");
  };

  var cargar = async function(){
    try{
      var d=await fbGet(PROD_KEY);
      if(d&&typeof d==="object"){
        var merged={}; 
        PRODUCTOS.forEach(function(p){
          merged[p]={
            recibido:0,
            registros:(d[p]&&d[p].registros)||[],
            inventario:(d[p]&&d[p].inventario)||[],
          };
        });
        setDatos(merged);
      } else { setDatos(initDatos()); }
    }catch(e){ setDatos(initDatos()); }
    try{ var h=await fbGet(HIST_KEY); if(h&&Array.isArray(h)) setHistorial(h); }catch(e){}
    try{ var p=await fbGet(PED_KEY); if(p&&typeof p==="object") setPedidos(p); }catch(e){}
    try{ var pc=await fbGet("pedidos-cerrados-v1"); if(pc&&typeof pc==="object") setPedidosCerrados(pc); }catch(e){}
    setLoading(false);
  };

  var guardar = async function(nuevo){
    setDatos(nuevo);
    await fbSet(PROD_KEY,nuevo);
  };

  useEffect(function(){ cargar(); },[]);
  useEffect(function(){
    var t=setInterval(cargar,30000);
    return function(){ clearInterval(t); };
  },[]);

  var setF = function(k,v){ setForm(function(f){ var n={}; Object.keys(f).forEach(function(fk){n[fk]=f[fk];}); n[k]=v; return n; }); };

  var registrar = async function(){
    if(!form) return;
    // Validacion completa
    var errores=[];
    if(!form.calidad) errores.push("Falta calidad");
    if(!form.cajas||parseInt(form.cajas)<=0) errores.push("Falta numero de cajas");
    if(!form.cliente) errores.push("Falta cliente");
    if(!form.rancho) errores.push("Falta rancho");
    if(!form.malla) errores.push("Falta malla");
    if(form.producto==="Persa"){
      if(!form.presentacion) errores.push("Falta presentacion");
      // Sub-calidad requerida solo para 20lb
      if(form.presentacion==="20lb"&&!form.subcalidad) errores.push("Falta sub-calidad (FCY/XF/Choice/ML/MS)");
    } else if(form.producto==="Europeo"){
      if(!form.presentacion) errores.push("Falta presentacion");
      // Tamano requerido para 12ct y 24ct
      if((form.presentacion==="12ct"||form.presentacion==="24ct")&&!form.tamano) errores.push("Falta tamano (Small/Mediano)");
    } else {
      if(!form.presentacion) errores.push("Falta presentacion");
    }
    if(errores.length>0){
      setErroresForm(errores);
      return;
    }
    setErroresForm([]);
    var nuevo={id:Date.now(),fecha:hoy()};
    Object.keys(form).forEach(function(k){nuevo[k]=form[k];});
    nuevo.cajas=parseInt(form.cajas);
    var nuevo2={}; Object.keys(datos).forEach(function(k){nuevo2[k]=datos[k];});
    var regs=(datos[form.producto]&&datos[form.producto].registros)||[];
    nuevo2[form.producto]={
      registros:[nuevo].concat(regs),
      inventario:(datos[form.producto]&&datos[form.producto].inventario)||[],
    };
    await guardar(nuevo2);
    setForm(initForm(form.producto));
  };

  var darBaja = async function(){
    if(!modalBaja) return;
    var itemId=modalBaja.itemId; var tipo=modalBaja.tipo; var producto=modalBaja.producto;
    var nuevo2={}; Object.keys(datos).forEach(function(k){nuevo2[k]=datos[k];});
    var linea2={registros:(datos[producto]&&datos[producto].registros)||[],inventario:(datos[producto]&&datos[producto].inventario)||[]};
    if(tipo==="reg"){
      var item=linea2.registros.filter(function(r){return r.id===itemId;})[0];
      // El registro SIEMPRE permanece para el conteo del dia
      // Solo lo marcamos como "bajado" para que no aparezca en inventario
      linea2.registros=linea2.registros.map(function(r){
        if(r.id!==itemId) return r;
        var n={}; Object.keys(r).forEach(function(k){n[k]=r[k];});
        n.bajado=true; n.motivoBaja=motivoBaja;
        if(motivoBaja==="Reproceso"&&presentacionReproceso) n.reprocesadoComo=presentacionReproceso;
        return n;
      });
      // Si es reproceso, agregar nueva entrada al inventario
      if(motivoBaja==="Reproceso"&&presentacionReproceso&&item){
        var repro={}; Object.keys(item).forEach(function(k){repro[k]=item[k];});
        repro.id=Date.now(); repro.presentacion=presentacionReproceso; repro.fechaInventario=hoy(); repro.esReproceso=true;
        linea2.inventario=[repro].concat(linea2.inventario);
      }
    } else {
      linea2.inventario=linea2.inventario.filter(function(r){return r.id!==itemId;});
    }
    nuevo2[producto]=linea2;
    await guardar(nuevo2);
    setModalBaja(null); setMotivoBaja("Reproceso"); setPresentacionReproceso("");
  };

  var cerrarDia = async function(){
    if(!prod) return;
    var datoProd=datos[prod]; var regs=(datoProd&&datoProd.registros)||[]; var invActual=(datoProd&&datoProd.inventario)||[];
    var snap={id:Date.now(),fecha:hoy(),producto:prod,registros:regs,totalCajas:regs.reduce(function(s,r){return s+(parseInt(r.cajas)||0);},0)};
    var nuevoHist=[snap].concat(historial).slice(0,300);
    setHistorial(nuevoHist);
    await fbSet(HIST_KEY,nuevoHist);
    var nuevoInv=regs.map(function(r){var n={}; Object.keys(r).forEach(function(k){n[k]=r[k];}); n.fechaInventario=hoy(); return n;}).concat(invActual);
    var nuevo2={}; Object.keys(datos).forEach(function(k){nuevo2[k]=datos[k];});
    nuevo2[prod]={registros:[],inventario:nuevoInv};
    await guardar(nuevo2);
    setConfirmCerrar(false); setTab("inventario");
  };

  var inp = {width:"100%",border:"1px solid rgba(255,255,255,0.15)",borderRadius:6,padding:"7px 10px",background:"rgba(0,0,0,0.3)",color:"#ffffff",fontFamily:"system-ui",fontSize:13,outline:"none"};
  var lbl = {fontSize:11,color:"#8899aa",textTransform:"uppercase",letterSpacing:1.5,marginBottom:3};

  // -- HISTORIAL --------------------------------------------------------------
  if(vistaHist){
    return (
      <div style={{background:"#0d1a12",minHeight:"100vh",color:"#f0ede8",fontFamily:"system-ui"}}>
        <div style={{maxWidth:600,margin:"0 auto",padding:"14px 12px 60px"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,borderBottom:"1px solid rgba(255,255,255,0.07)",paddingBottom:10}}>
            <button onClick={function(){setVistaHist(false);}} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,padding:"5px 10px",color:"#b0bec5",fontSize:11,cursor:"pointer",fontFamily:"system-ui"}}>Volver</button>
            <div style={{fontSize:16,fontWeight:900,color:"#ffffff"}}>HISTORIAL DE PRODUCCION</div>
          </div>
          {!historial.length
            ? <div style={{textAlign:"center",padding:40,color:"#8899aa"}}>Sin dias cerrados</div>
            : historial.map(function(h){
              var col=COLORES[h.producto]||"#b0bec5";
              var porCliente={};
              (h.registros||[]).forEach(function(r){ porCliente[r.cliente]=(porCliente[r.cliente]||0)+(parseInt(r.cajas)||0); });
              var porRancho={};
              (h.registros||[]).forEach(function(r){
                var k=r.rancho+"/M"+r.malla;
                porRancho[k]=(porRancho[k]||0)+(parseInt(r.cajas)||0);
              });
              return (
                <div key={h.id} style={{background:"rgba(0,0,0,0.3)",border:"1px solid "+col+"33",borderRadius:10,padding:"10px 12px",marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                    <span style={{fontSize:14,fontWeight:900,color:col}}>{h.producto}</span>
                    <span style={{fontSize:13,color:"#8899aa"}}>{h.fecha}</span>
                  </div>
                  <div style={{fontSize:22,fontWeight:900,color:"#ffffff",fontFamily:"Georgia,serif",marginBottom:8}}>{h.totalCajas} cajas</div>
                  <div style={{fontSize:12,color:"#8899aa",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Por cliente</div>
                  {Object.keys(porCliente).map(function(c){
                    return (
                      <div key={c} style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"2px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                        <span style={{color:"#b0bec5"}}>{c}</span>
                        <span style={{color:"#ffffff",fontWeight:700}}>{porCliente[c]} cajas</span>
                      </div>
                    );
                  })}
                  <div style={{fontSize:12,color:"#8899aa",textTransform:"uppercase",letterSpacing:1,marginTop:6,marginBottom:4}}>Por rancho/malla</div>
                  {Object.keys(porRancho).map(function(c){
                    return (
                      <div key={c} style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"2px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                        <span style={{color:"#b0bec5"}}>{c}</span>
                        <span style={{color:"#ffffff",fontWeight:700}}>{porRancho[c]} cajas</span>
                      </div>
                    );
                  })}
                </div>
              );
            })
          }
          {historial.length>0&&(
            confirmBorrarHist?(
              <div style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:8,padding:"10px",marginTop:10}}>
                <div style={{fontSize:12,color:"#ffffff",marginBottom:8}}>Borrar todo el historial?</div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={function(){setConfirmBorrarHist(false);}} style={{flex:1,padding:"7px",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,color:"#b0bec5",fontSize:11,cursor:"pointer",fontFamily:"system-ui"}}>Cancelar</button>
                  <button onClick={async function(){setHistorial([]); await fbSet(HIST_KEY,[]); setConfirmBorrarHist(false);}} style={{flex:1,padding:"7px",background:"rgba(239,68,68,0.2)",border:"1px solid rgba(239,68,68,0.4)",borderRadius:6,color:"#ef4444",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"system-ui"}}>Borrar todo</button>
                </div>
              </div>
            ):(
              <button onClick={function(){setConfirmBorrarHist(true);}} style={{width:"100%",padding:"8px",marginTop:10,background:"transparent",border:"1px solid rgba(239,68,68,0.3)",borderRadius:6,color:"#ef4444",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"system-ui"}}>Borrar historial</button>
            )
          )}
        </div>
      </div>
    );
  }

  // -- DETALLE PRODUCTO -------------------------------------------------------
  if(prod){
    var col=COLORES[prod]||"#b0bec5";
    var datoProd=datos[prod]||{registros:[],inventario:[]};
    var registros=(datoProd.registros)||[];
    var inventario=(datoProd.inventario)||[];
    var clts=CLIENTES[prod]||[];
    var esPersa=prod==="Persa";
    var pedidosActivos=Array.isArray(pedidos[prod])?pedidos[prod]:[];
    var totalHoy=registros.reduce(function(s,r){return s+(parseInt(r.cajas)||0);},0);

    // Opciones del formulario segun producto
    var persaPcts=esPersa?FLUJO_PERSA.map(function(x){return x.pct;}):[];
    var persaPctSel=esPersa&&form?FLUJO_PERSA.filter(function(x){return x.pct===form.presentacion;})[0]:null;
    var persaCalOpts=persaPctSel?persaPctSel.cals:[];
    var persaCalSel=persaCalOpts.filter(function(c){return c.cal===(form?form.calidad:"");})[0]||null;
    var persaSubOpts=persaCalSel&&persaCalSel.subs?persaCalSel.subs:[];

    var otroFlujo=!esPersa?FLUJO_OTROS[prod]:null;
    var otroCalOpts=otroFlujo?otroFlujo.cals:[];
    var otroCalSel=otroCalOpts.filter(function(c){return c.cal===(form?form.calidad:"");})[0]||null;
    var otroPcts=[];
    if(otroFlujo&&otroFlujo.pcts){
      if(Array.isArray(otroFlujo.pcts)){
        otroPcts=otroFlujo.pcts;
        if(prod==="Slicer"&&form&&form.cliente==="Lakeway"){
          otroPcts=otroPcts.concat(["62 piezas","Small"]);
        }
      } else if(form&&form.calidad){
        otroPcts=otroFlujo.pcts[form.calidad]||[];
      }
    }
    var otroTams=[];
    if(otroFlujo&&otroFlujo.tams&&form&&form.presentacion){
      otroTams=otroFlujo.tams[form.presentacion]||[];
    }

    // Avance pedidos
    var avancesPedidos=pedidosActivos.map(function(ped){
      var cajasPed=registros.filter(function(r){return r.cliente===ped.cliente&&(!ped.calidad||r.calidad===ped.calidad)&&(!ped.presentacion||r.presentacion===ped.presentacion||r.subcalidad===ped.presentacion);}).reduce(function(s,r){return s+(parseInt(r.cajas)||0);},0);
      var total=parseInt(ped.cajas)||1;
      var pct=Math.min(100,Math.round(cajasPed/total*100));
      return {ped:ped,cajasPed:cajasPed,pct:pct,falta:Math.max(0,total-cajasPed)};
    });

    // Filtros
    var regFiltrados=registros.filter(function(r){
      return !r.bajado&&(!filtroCliente||r.cliente===filtroCliente)&&(!filtroRancho||r.rancho===filtroRancho)&&(!filtroMalla||r.malla===filtroMalla);
    });
    var regsActivos=registros.filter(function(r){return !r.bajado;});
    var regsBajados=registros.filter(function(r){return r.bajado;});
    var clientesReg=regFiltrados.reduce(function(arr,r){
      if(arr.indexOf(r.cliente)===-1) arr.push(r.cliente);
      return arr;
    },[]);

    return (
      <div style={{background:"#0d1a12",minHeight:"100vh",color:"#f0ede8",fontFamily:"system-ui"}}>
        <div style={{maxWidth:600,margin:"0 auto",padding:"10px 12px 60px"}}>

          {/* Header */}
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,borderBottom:"1px solid rgba(255,255,255,0.07)",paddingBottom:10}}>
            <button onClick={function(){setProd(null);}} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,padding:"5px 10px",color:"#b0bec5",fontSize:11,cursor:"pointer",fontFamily:"system-ui"}}>Volver</button>
            <div style={{fontSize:26,fontWeight:900,color:col}}>{prod}</div>
            <div style={{marginLeft:"auto",display:"flex",gap:5}}>
              <button onClick={function(){setFormPedido({producto:prod,cliente:"",calidad:"",presentacion:"",cajas:""});setModalPedido(true);}} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:6,padding:"5px 8px",color:"#b0bec5",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"system-ui"}}>Pedido</button>
              <button onClick={function(){setConfirmCerrar(true);}} style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:6,padding:"5px 8px",color:"#ef4444",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"system-ui"}}>Cerrar dia</button>
            </div>
          </div>

          {/* Total y resumen por presentacion */}
          <div style={{background:"rgba(0,0,0,0.3)",border:"1px solid "+col+"33",borderRadius:8,padding:"10px 12px",marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:totalHoy>0?8:0}}>
              <div style={{fontSize:12,color:"#b0bec5",textTransform:"uppercase",letterSpacing:1}}>Total empacado hoy</div>
              <div style={{fontSize:42,fontWeight:900,color:col,fontFamily:"Georgia,serif"}}>{totalHoy} cajas</div>
            </div>
            {totalHoy>0&&(function(){
              var porPct={};
              registros.forEach(function(r){
                var k=r.presentacion||(r.calidad||"");
                porPct[k]=(porPct[k]||0)+(parseInt(r.cajas)||0);
              });
              return (
                <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                  {Object.keys(porPct).map(function(k){
                    return (
                      <div key={k} style={{background:col+"18",border:"1px solid "+col+"33",borderRadius:6,padding:"4px 8px",textAlign:"center"}}>
                        <div style={{fontSize:14,fontWeight:900,color:col,fontFamily:"Georgia,serif"}}>{porPct[k]}</div>
                        <div style={{fontSize:11,color:"#8899aa"}}>{k}</div>
                      </div>
                    );
                  })}
                </div>
              );
            })()}
          </div>

          {/* Pedidos activos */}
          {avancesPedidos.map(function(ap){
            var ped=ap.ped;
            return (
              <div key={ped.id||ped.cliente} style={{background:"rgba(0,0,0,0.3)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:8,padding:"10px 12px",marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <div>
                    <div style={{fontSize:12,color:"#8899aa",textTransform:"uppercase",letterSpacing:1}}>Pedido activo</div>
                    <div style={{fontSize:12,fontWeight:700,color:"#ffffff"}}>{ped.cliente}{ped.calidad?" . "+ped.calidad:""}{ped.presentacion?" . "+ped.presentacion:""}</div>
                  </div>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <div style={{fontSize:11,color:"#8899aa"}}>{ped.cajas} cajas</div>
                    <button onClick={function(){setConfirmCerrarPed(ped);}} style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:5,padding:"3px 8px",color:"#ef4444",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"system-ui"}}>Cerrar pedido</button>
                  </div>
                </div>
                <div style={{height:28,background:"rgba(239,68,68,0.15)",borderRadius:8,overflow:"hidden",display:"flex",border:"1px solid rgba(255,255,255,0.07)"}}>
                  <div style={{height:"100%",width:ap.pct+"%",background:ap.pct>=100?"#22c55e":col,borderRadius:"8px 0 0 8px",transition:"width 0.4s",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {ap.pct>8&&<span style={{fontSize:13,fontWeight:700,color:"#000",whiteSpace:"nowrap",padding:"0 6px"}}>{ap.cajasPed} cjs ({ap.pct}%)</span>}
                  </div>
                  <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {ap.falta>0&&<span style={{fontSize:13,fontWeight:700,color:"rgba(239,68,68,0.7)",whiteSpace:"nowrap",padding:"0 6px"}}>Faltan {ap.falta} ({100-ap.pct}%)</span>}
                  </div>
                </div>
              </div>
            );
          })}

          {/* Tabs */}
          <div style={{display:"flex",borderBottom:"1px solid rgba(255,255,255,0.07)",marginBottom:12}}>
            {["registro","bajas","inventario","cerrados"].map(function(id){
              var pedsCerr=Array.isArray(pedidosCerrados[prod])?pedidosCerrados[prod]:[];
              var regsActivos=registros.filter(function(r){return !r.bajado;});
              var regsBajados=registros.filter(function(r){return r.bajado;});
              var lb=id==="registro"?"Registro"+(regsActivos.length>0?" ("+regsActivos.length+")":""):
                id==="bajas"?"Bajas"+(regsBajados.length>0?" ("+regsBajados.length+")":""):
                id==="inventario"?"Inv."+(inventario.length>0?" ("+inventario.length+")":""):
                "Pedidos"+(pedsCerr.length>0?" ("+pedsCerr.length+")":"");
              return (
                <button key={id} onClick={function(){setTab(id);}} style={{flex:1,padding:"7px",border:"none",background:"transparent",fontFamily:"system-ui",fontSize:12,fontWeight:700,cursor:"pointer",color:tab===id?col:"#8899aa",textTransform:"uppercase",borderBottom:tab===id?"2px solid "+col:"2px solid transparent"}}>{lb}</button>
              );
            })}
          </div>

          {/* Registro */}
          {tab==="registro"&&(
            <div>
              {/* Botones de accion */}
              <div style={{display:"flex",gap:6,marginBottom:10}}>
                {!modoSeleccion
                  ? <button onClick={function(){setForm(initForm(prod));}} style={{flex:2,padding:"10px",background:col+"22",border:"1px solid "+col+"55",borderRadius:8,color:col,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"system-ui"}}>+ Registrar cajas</button>
                  : <button onClick={function(){setModalBajaMulti(true);}} disabled={seleccionados.length===0} style={{flex:2,padding:"10px",background:seleccionados.length>0?"rgba(239,68,68,0.2)":"rgba(255,255,255,0.04)",border:"1px solid "+(seleccionados.length>0?"rgba(239,68,68,0.5)":"rgba(255,255,255,0.1)"),borderRadius:8,color:seleccionados.length>0?"#ef4444":"#8899aa",fontSize:12,fontWeight:700,cursor:seleccionados.length>0?"pointer":"default",fontFamily:"system-ui"}}>Dar de baja ({seleccionados.length})</button>
                }
                <button onClick={function(){setModoSeleccion(!modoSeleccion); setSeleccionados([]);}} style={{flex:1,padding:"10px",background:modoSeleccion?"rgba(245,158,11,0.15)":"rgba(255,255,255,0.05)",border:"1px solid "+(modoSeleccion?"rgba(245,158,11,0.4)":"rgba(255,255,255,0.1)"),borderRadius:8,color:modoSeleccion?"#f59e0b":"#b0bec5",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"system-ui"}}>{modoSeleccion?"Cancelar":"Seleccionar"}</button>
              </div>
              {!form
                ? null
                : (
                  <div style={{background:"rgba(0,0,0,0.3)",border:"1px solid "+col+"44",borderRadius:8,padding:"10px 12px",marginBottom:10}}>
                    {/* Persa: Presentacion primero */}
                    {esPersa&&(
                      <div style={{marginBottom:6}}>
                        <div style={lbl}>Presentacion</div>
                        <select style={inp} value={form.presentacion} onChange={function(e){setForm(function(f){return {producto:f.producto,presentacion:e.target.value,calidad:"",subcalidad:"",tamano:"",cliente:f.cliente,rancho:f.rancho,malla:f.malla,linea:f.linea,cajas:f.cajas,hora:f.hora};});}}>
                          <option value="">-- Seleccionar --</option>
                          {persaPcts.map(function(p){return <option key={p}>{p}</option>;})}
                        </select>
                      </div>
                    )}
                    {/* Calidad */}
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:6}}>
                      <div><div style={lbl}>Calidad</div>
                        <select style={inp} value={form.calidad} onChange={function(e){setF("calidad",e.target.value); setF("subcalidad","");}}>
                          <option value="">-- Seleccionar --</option>
                          {(esPersa?persaCalOpts:otroCalOpts).map(function(c){return <option key={c.cal}>{c.cal}</option>;})}
                        </select>
                      </div>
                      {/* Sub-calidad (solo Persa 20lb) */}
                      {esPersa&&persaSubOpts.length>0&&(
                        <div><div style={lbl}>Sub-calidad</div>
                          <select style={inp} value={form.subcalidad} onChange={function(e){setF("subcalidad",e.target.value);}}>
                            <option value="">-- Seleccionar --</option>
                            {persaSubOpts.map(function(s){return <option key={s}>{s}</option>;})}
                          </select>
                        </div>
                      )}
                      {/* Presentacion para no-Persa */}
                      {!esPersa&&otroPcts.length>0&&(
                        <div><div style={lbl}>Presentacion</div>
                          <select style={inp} value={form.presentacion} onChange={function(e){setF("presentacion",e.target.value); setF("tamano","");}}>
                            <option value="">-- Seleccionar --</option>
                            {otroPcts.map(function(p){return <option key={p}>{p}</option>;})}
                          </select>
                        </div>
                      )}
                    </div>
                    {/* Tamano (solo Europeo) */}
                    {!esPersa&&otroTams.length>0&&(
                      <div style={{marginBottom:6}}>
                        <div style={lbl}>Tamano</div>
                        <select style={inp} value={form.tamano} onChange={function(e){setF("tamano",e.target.value);}}>
                          <option value="">-- Seleccionar --</option>
                          {otroTams.map(function(t){return <option key={t}>{t}</option>;})}
                        </select>
                      </div>
                    )}
                    {/* Cliente */}
                    <div style={{marginBottom:6}}>
                      <div style={lbl}>Cliente</div>
                      <select style={inp} value={form.cliente} onChange={function(e){setF("cliente",e.target.value);}}>
                        <option value="">-- Seleccionar --</option>
                        {clts.map(function(c){return <option key={c}>{c}</option>;})}
                      </select>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:6}}>
                      <div><div style={lbl}>Rancho</div>
                        <select style={inp} value={form.rancho} onChange={function(e){setF("rancho",e.target.value);}}>
                          {RANCHOS.map(function(r){return <option key={r}>{r}</option>;})}
                        </select>
                      </div>
                      <div><div style={lbl}>Malla</div>
                        <input style={inp} placeholder="Ej: 5" value={form.malla} onChange={function(e){setF("malla",e.target.value);}}/>
                      </div>
                      <div><div style={lbl}>Cajas</div>
                        <input style={inp} type="number" placeholder="0" value={form.cajas} onChange={function(e){setF("cajas",e.target.value);}}/>
                      </div>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
                      <div><div style={lbl}>Linea</div>
                        <select style={inp} value={form.linea} onChange={function(e){setF("linea",e.target.value);}}>
                          {LINEAS_PROC.map(function(l){return <option key={l}>{l}</option>;})}
                        </select>
                      </div>
                      <div><div style={lbl}>Hora</div>
                        <input style={inp} type="time" value={form.hora} onChange={function(e){setF("hora",e.target.value);}}/>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={function(){setForm(null); setErroresForm([]);}} style={{flex:1,padding:"8px",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,color:"#8899aa",fontSize:11,cursor:"pointer",fontFamily:"system-ui"}}>Cancelar</button>
                      <button onClick={registrar} style={{flex:2,padding:"8px",background:col,border:"none",borderRadius:6,color:"#000",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"system-ui"}}>Guardar</button>
                    </div>
                    {erroresForm.length>0&&(
                      <div style={{marginTop:8,background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.4)",borderRadius:6,padding:"8px 10px"}}>
                        <div style={{fontSize:13,fontWeight:700,color:"#ef4444",marginBottom:4}}>Faltan datos:</div>
                        {erroresForm.map(function(e){return <div key={e} style={{fontSize:13,color:"#ef4444"}}>- {e}</div>;})}
                      </div>
                    )}
                  </div>
                )
              }

              {/* Filtros */}
              {registros.length>0&&(
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:5,marginBottom:10}}>
                  <select style={{...inp,fontSize:13,padding:"5px 8px"}} value={filtroCliente} onChange={function(e){setFiltroCliente(e.target.value);}}>
                    <option value="">Todos clientes</option>
                    {clts.map(function(c){return <option key={c}>{c}</option>;})}
                  </select>
                  <select style={{...inp,fontSize:13,padding:"5px 8px"}} value={filtroRancho} onChange={function(e){setFiltroRancho(e.target.value);}}>
                    <option value="">Todos ranchos</option>
                    {RANCHOS.map(function(r){return <option key={r}>{r}</option>;})}
                  </select>
                  <input style={{...inp,fontSize:13,padding:"5px 8px"}} placeholder="Malla..." value={filtroMalla} onChange={function(e){setFiltroMalla(e.target.value);}}/>
                </div>
              )}

              {registros.length===0
                ? <div style={{textAlign:"center",padding:30,color:"#8899aa",fontSize:12}}>Sin registros hoy</div>
                : regFiltrados.length===0
                ? <div style={{textAlign:"center",padding:20,color:"#8899aa",fontSize:11}}>Sin resultados</div>
                : clientesReg.map(function(cliente){
                  var regsCliente=regFiltrados.filter(function(r){return r.cliente===cliente;});
                  var totalCliente=regsCliente.reduce(function(s,r){return s+(parseInt(r.cajas)||0);},0);
                  return (
                    <div key={cliente} style={{marginBottom:12}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5,padding:"4px 0",borderBottom:"1px solid "+col+"33"}}>
                        <span style={{fontSize:15,fontWeight:700,color:col}}>{cliente}</span>
                        <span style={{fontSize:16,fontWeight:700,color:"#ffffff",fontFamily:"Georgia,serif"}}>{totalCliente} cajas</span>
                      </div>
                      {regsCliente.map(function(r){
                        return (
                          <div key={r.id} onClick={function(){if(!modoSeleccion)return; var idx=seleccionados.indexOf(r.id); if(idx>=0){var ns=seleccionados.filter(function(x){return x!==r.id;}); setSeleccionados(ns);}else{setSeleccionados(seleccionados.concat([r.id]));};}} style={{background:r.bajado?"rgba(0,0,0,0.1)":seleccionados.indexOf(r.id)>=0?"rgba(245,158,11,0.1)":"rgba(0,0,0,0.2)",border:"1px solid "+(r.bajado?"rgba(255,255,255,0.03)":seleccionados.indexOf(r.id)>=0?"rgba(245,158,11,0.4)":"rgba(255,255,255,0.06)"),borderRadius:7,padding:"7px 10px",marginBottom:4,display:"flex",justifyContent:"space-between",alignItems:"center",cursor:modoSeleccion?"pointer":"default"}}>
                            {modoSeleccion&&(
                              <div style={{width:18,height:18,borderRadius:4,border:"2px solid "+(seleccionados.indexOf(r.id)>=0?"#f59e0b":"rgba(255,255,255,0.2)"),background:seleccionados.indexOf(r.id)>=0?"#f59e0b":"transparent",marginRight:8,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                                {seleccionados.indexOf(r.id)>=0&&<span style={{color:"#000",fontSize:11,fontWeight:900}}>v</span>}
                              </div>
                            )}
                            <div style={{flex:1}}>
                              <div style={{fontSize:14,fontWeight:700,color:r.bajado?"#8899aa":"#ffffff"}}>{r.calidad}{r.subcalidad?" / "+r.subcalidad:""}{r.presentacion?" - "+r.presentacion:""}{r.tamano?" ("+r.tamano+")":""}{r.bajado?" ["+r.motivoBaja+"]":""}</div>
                              <div style={{fontSize:11,color:"#b0bec5"}}>{r.rancho} . M{r.malla} . L.{r.linea} . {r.hora}</div>
                            </div>
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <div style={{fontSize:24,fontWeight:900,color:r.bajado?"#8899aa":col,fontFamily:"Georgia,serif"}}>{r.cajas}</div>
                              {!modoSeleccion&&!r.bajado&&<button onClick={function(){setModalBaja({itemId:r.id,tipo:"reg",producto:prod});}} style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:5,padding:"3px 7px",color:"#ef4444",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"system-ui"}}>Baja</button>}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })
              }
            </div>
          )}

          {/* Dados de baja */}
          {tab==="bajas"&&(
            <div>
              {regsBajados.length===0
                ? <div style={{textAlign:"center",padding:30,color:"#8899aa",fontSize:12}}>Sin bajas hoy</div>
                : regsBajados.map(function(r){
                  return (
                    <div key={r.id} style={{background:"rgba(0,0,0,0.2)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:7,padding:"8px 10px",marginBottom:6}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div>
                          <div style={{fontSize:11,fontWeight:700,color:"#b0bec5"}}>{r.calidad}{r.subcalidad?" / "+r.subcalidad:""}{r.presentacion?" - "+r.presentacion:""}</div>

  if(loading) return <div style={{background:"#0d1a12",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"#22c55e",fontFamily:"monospace",fontSize:14}}>Cargando...</div>;

  var alertasTotal=PRODUCTOS.reduce(function(s,p){
    var inv=(datos[p]&&datos[p].inventario)||[];
    return s+inv.filter(function(r){return diasDesde(r.fechaInventario||r.fecha||"")>=DIAS_ALARMA;}).length;
  },0);

  return (
    <div style={{background:"#0d1a12",minHeight:"100vh",color:"#f0ede8",fontFamily:"system-ui"}}>
      <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"radial-gradient(135deg, #1a3020 0%, #0d1a12 60%)",zIndex:0,pointerEvents:"none"}}/>
      <div style={{position:"relative",zIndex:1,maxWidth:900,margin:"0 auto",padding:"14px 12px 60px"}}>

        <div style={{textAlign:"center",marginBottom:16,borderBottom:"1px solid rgba(34,197,94,0.15)",paddingBottom:12}}>
          <div style={{fontSize:11,color:"#22c55e",textTransform:"uppercase",letterSpacing:4,marginBottom:4}}>Parras Valley</div>
          <div style={{fontSize:32,fontWeight:900,color:"#ffffff",letterSpacing:2}}>PRODUCCION</div>
          <div style={{display:"flex",gap:6,justifyContent:"center",marginTop:8}}>
            {alertasTotal>0&&<div style={{background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.4)",borderRadius:20,padding:"3px 10px",fontSize:12,color:"#ef4444",fontWeight:700}}>{alertasTotal} alertas inventario</div>}
            <button onClick={function(){setVistaHist(true);}} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:20,padding:"3px 10px",color:"#b0bec5",fontSize:12,cursor:"pointer",fontFamily:"system-ui"}}>Historial</button>
            <button onClick={cargar} style={{background:"rgba(34,197,94,0.08)",border:"1px solid rgba(34,197,94,0.2)",borderRadius:20,padding:"3px 10px",color:"#22c55e",fontSize:12,cursor:"pointer",fontFamily:"system-ui"}}>Actualizar</button>
          </div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(160px, 1fr))",gap:10}}>
          {PRODUCTOS.map(function(p){
            var col=COLORES[p]||"#b0bec5";
            var reg=(datos[p]&&datos[p].registros)||[];
            var inv=(datos[p]&&datos[p].inventario)||[];
            var total=reg.reduce(function(s,r){return s+(parseInt(r.cajas)||0);},0);
            var totalInv=inv.reduce(function(s,r){return s+(parseInt(r.cajas)||0);},0);
            var alertas=inv.filter(function(r){return diasDesde(r.fechaInventario||r.fecha||"")>=DIAS_ALARMA;}).length;
            var pedProd=Array.isArray(pedidos[p])?pedidos[p]:[];
            return (
              <div key={p} onClick={function(){setProd(p); setTab("registro"); setForm(null); setFiltroCliente(""); setFiltroRancho(""); setFiltroMalla("");}}
                style={{background:"linear-gradient(135deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.2) 100%)",border:"2px solid "+(alertas>0?"rgba(239,68,68,0.6)":col+"44"),borderRadius:14,padding:"14px",cursor:"pointer",position:"relative",overflow:"hidden"}}>
                {alertas>0&&<div style={{position:"absolute",top:8,right:8,background:"#ef4444",borderRadius:"50%",width:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#fff",fontWeight:700}}>{alertas}</div>}
                <div style={{fontSize:22,fontWeight:900,color:col,marginBottom:10}}>{p}</div>
                <div style={{marginBottom:6}}>
                  <div style={{fontSize:11,color:"#b0bec5",textTransform:"uppercase",letterSpacing:1}}>Empacado hoy</div>
                  <div style={{fontSize:52,fontWeight:900,color:"#ffffff",fontFamily:"Georgia,serif",lineHeight:1}}>{total}</div>
                  <div style={{fontSize:13,color:"#b0bec5",letterSpacing:1}}>cajas</div>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:10}}>
                  <span style={{color:"#b0bec5"}}>Inventario:</span>
                  <span style={{color:alertas>0?"#ef4444":col,fontWeight:700}}>{totalInv} cajas</span>
                </div>
                {pedProd.length>0&&pedProd[0]&&pedProd[0].cajas&&(
                  <MiniPedido ped={pedProd[0]} reg={reg} col={col}/>
                )}
              </div>
            );
          })}
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
