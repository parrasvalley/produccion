async function siguienteFolio(rancho,producto){
  var anio=new Date().getFullYear();
  // Contador separado por cultivo
  var claveAnio=FOLIO_KEY+"-"+anio+"-"+(producto||"Gen");
  // Leer contador actual
  var n=1;
  try{
    var local=localStorage.getItem(claveAnio);
    if(local)n=parseInt(local)||1;
    var r=await fetch(FB_URL+"/"+claveAnio+".json",{signal:AbortSignal.timeout(3000)});
    if(r.ok){var rv=await r.json();if(rv&&parseInt(rv)>n)n=parseInt(rv);}
  }catch(e){}
  var d=new Date();
  var mm=String(d.getMonth()+1).padStart(2,"0");
  var dd=String(d.getDate()).padStart(2,"0");
  var rClave=RANCHO_FOLIO[rancho]||"GEN";
  var folio=rClave+"-"+mm+dd+"-"+String(n).padStart(3,"0");
  var siguiente=n+1;
  try{localStorage.setItem(claveAnio,String(siguiente));}catch(e){}
  fetch(FB_URL+"/"+claveAnio+".json",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(siguiente)}).catch(function(){});
  return folio;
}

function esDuplicado(datos,folio){
  var dup=false;
  Object.keys(datos||{}).forEach(function(p){
    ((datos[p]&&datos[p].registros)||[]).forEach(function(r){
      if(r.folio===folio)dup=true;
    });
  });
  return dup;
}

// Contar registros totales en datos
function contarRegs(d){
  if(!d||typeof d!=="object")return 0;
  var n=0;
  Object.keys(d).forEach(function(k){
    var v=d[k];
    if(v&&Array.isArray(v.registros))n+=v.registros.length;
    if(v&&Array.isArray(v.inventario))n+=v.inventario.length;
  });
  return n;
}

async function fbGet(key){
  // Leer local primero
  var local=null;
  try{ var lv=localStorage.getItem(key); if(lv)local=JSON.parse(lv); }catch(e){}
  // Intentar Firebase
  var remote=null;
  try{
    var r=await fetch(FB_URL+"/"+key+".json",{signal:AbortSignal.timeout(5000)});
    if(r.ok)remote=await r.json();
  }catch(e){}
  // Si Firebase retorna null/vaco, confiar en Firebase (puede ser reset intencional)
  // Solo usar local si Firebase falla por red (remote===null por error, no por dato vaco)
  if(remote===undefined||remote===null){
    // Distinguir: si el fetch tir error = remote es null por falla de red
    // En ese caso usar local como fallback
    return local;
  }
  // Firebase respondio (aunque sea vaco/null) - respetarlo
  // Solo mezclar si local tiene PEDIDOS/REGISTROS que Firebase no tiene
  // Para produccion-v1: usar el que tenga ms datos
  if(key===PROD_KEY){
    var nLocal=contarRegs(local);var nRemote=contarRegs(remote);
    var pending=null;try{pending=localStorage.getItem(key+"_pending");}catch(e){}
    if(pending&&nLocal>nRemote){
      // Hay cambios pendientes de subir - usar local
      fetch(FB_URL+"/"+key+".json",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(local)})
        .then(function(){try{localStorage.removeItem(key+"_pending");}catch(e){};}).catch(function(){});
      return local;
    }
    // Sin pendientes: confiar en Firebase
    try{localStorage.setItem(key,JSON.stringify(remote));}catch(e){}
    return remote;
  }
  // Para otros nodos: confiar en Firebase siempre
  try{localStorage.setItem(key,JSON.stringify(remote));}catch(e){}
  return remote;
}

async function fbSet(key,value){
  // 1. Guardar en localStorage SIEMPRE (inmediato, sin internet)
  try{ localStorage.setItem(key,JSON.stringify(value)); }catch(e){}
  // 2. Intentar Firebase
  var ok=false;
  try{
    var r=await fetch(FB_URL+"/"+key+".json",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(value),signal:AbortSignal.timeout(8000)});
    ok=r.ok;
  }catch(e){}
  // 3. Si fallo Firebase, marcar como pendiente
  if(!ok){
    try{ localStorage.setItem(key+"_pending","1"); }catch(e){}
  } else {
    try{ localStorage.removeItem(key+"_pending"); }catch(e){}
  }
  return ok;
}

function JalarEmbarques(props){
  var prod=props.prod;var inventario=props.inventario;var bajados=props.bajados;
  var datos=props.datos;var guardar=props.guardar;var requerirPin=props.requerirPin;var col=props.col;
  var sA=useState(false);var abierto=sA[0];var setAbierto=sA[1];
  var sF=useState(fechaLocalISO());var fecha=sF[0];var setFecha=sF[1];
  var sL=useState(false);var loading=sL[0];var setLoading=sL[1];
  var sM=useState(null);var msg=sM[0];var setMsg=sM[1];
  var sP=useState([]);var preview=sP[0];var setPreview=sP[1];
  var sR=useState(null);var resultado=sR[0];var setResultado=sR[1];

  // Extraer base y tipo del nombre de producto en embarques
  // "Persa Conv" -> {base:"Persa", tipo:"Convencional"}
  function parseProdEmb(nombre){
    if(!nombre)return{base:"",tipo:"Convencional"};
    var tipo=nombre.indexOf(" Org")>=0?"Organico":"Convencional";
    var base=nombre.replace(" Conv","").replace(" Org","").trim();
    return{base:base,tipo:tipo};
  }

  // Calcular preview FIFO sin usar rancho
  function calcPreview(lineasEmb,invActual){
    var invSim=invActual.slice();
    var items=[];
    lineasEmb.forEach(function(l){
      var p=parseProdEmb(l.producto);
      if(p.base!==prod)return; // Solo el producto activo
      var cajasNec=parseInt(l.cajas)||0;
      // Candidatos: presentacion + calidad + tipo, ordenados por fecha (FIFO)
      var cands=invSim.filter(function(pal){
        var presOk=!l.presentacion||(pal.presentacion||"").toLowerCase()===(l.presentacion||"").toLowerCase();
        var calOk=!l.calidad||(pal.calidad||"").toLowerCase()===(l.calidad||"").toLowerCase();
        var tipoOk=(pal.tipoProd||"Convencional")===p.tipo;
        return presOk&&calOk&&tipoOk;
      }).sort(function(a,b){
        var fa=a.fecha||a.fechaInventario||"";var fb=b.fecha||b.fechaInventario||"";
        return fa<fb?-1:fa>fb?1:0;
      });
      var paletsAfectados=[];var cajasRest=cajasNec;
      cands.forEach(function(pal){
        if(cajasRest<=0)return;
        var cajasP=parseInt(pal.cajas)||0;
        if(cajasP<=cajasRest){
          paletsAfectados.push({folio:pal.folio||"",rancho:pal.rancho||"",fecha:pal.fecha||"",cajas:cajasP,completo:true});
          invSim=invSim.filter(function(x){return x.id!==pal.id;});
          cajasRest-=cajasP;
        } else {
          paletsAfectados.push({folio:pal.folio||"",rancho:pal.rancho||"",fecha:pal.fecha||"",cajas:cajasRest,completo:false,resto:cajasP-cajasRest});
          invSim=invSim.map(function(x){return x.id===pal.id?Object.assign({},x,{cajas:cajasP-cajasRest}):x;});
          cajasRest=0;
        }
      });
      items.push({linea:l,p:p,cajasNec:cajasNec,cajasFaltantes:cajasRest,paletsAfectados:paletsAfectados});
    });
    return{items:items,invSim:invSim};
  }

  function cargarEmbarques(){
    setLoading(true);setMsg(null);setResultado(null);
    fetch("https://parrasvalley-default-rtdb.firebaseio.com/embarques-v1.json")
      .then(function(r){return r.json();})
      .then(function(d){
        var arr=Array.isArray(d)?d.filter(Boolean):(d&&typeof d==="object"?Object.values(d).filter(Boolean):[]);
        var delDia=arr.filter(function(e){return e.cab&&e.cab.fecha===fecha;});
        var lineas=[];
        delDia.forEach(function(e){(e.lineas||[]).forEach(function(l){lineas.push(l);});});
        var lineasProd=lineas.filter(function(l){var p=parseProdEmb(l.producto);return p.base===prod;});
        var prev=calcPreview(lineasProd,inventario.slice());
        setPreview(prev.items);
        setLoading(false);
        if(!lineasProd.length)setMsg("No hay embarques de "+prod+" registrados el "+fecha);
      }).catch(function(){setLoading(false);setMsg("Error al conectar con Firebase");});
  }

  function ejecutarDescuento(){
    requerirPin(function(){
      var nd=Object.assign({},datos);
      var invAct=inventario.slice();
      var bajAct=(Array.isArray(nd[prod]&&nd[prod].bajados)?nd[prod].bajados:(nd[prod]&&nd[prod].bajados?Object.values(nd[prod].bajados).filter(Boolean):[])).slice();
      var errores=[];var totalDesc=0;
      preview.forEach(function(item){
        var l=item.linea;var p=item.p;
        var cajasRest=parseInt(l.cajas)||0;
        var cands=invAct.filter(function(pal){
          var presOk=!l.presentacion||(pal.presentacion||"").toLowerCase()===(l.presentacion||"").toLowerCase();
          var calOk=!l.calidad||(pal.calidad||"").toLowerCase()===(l.calidad||"").toLowerCase();
          var tipoOk=(pal.tipoProd||"Convencional")===p.tipo;
          return presOk&&calOk&&tipoOk;
        }).sort(function(a,b){var fa=a.fecha||a.fechaInventario||"";var fb=b.fecha||b.fechaInventario||"";return fa<fb?-1:fa>fb?1:0;});
        cands.forEach(function(pal){
          if(cajasRest<=0)return;
          var cajasP=parseInt(pal.cajas)||0;
          if(cajasP<=cajasRest){
            invAct=invAct.filter(function(x){return x.id!==pal.id;});
            bajAct=[Object.assign({},pal,{motivoBaja:"Embarque",fechaBaja:fecha,clienteEmbarque:l.cliente||""})].concat(bajAct);
            cajasRest-=cajasP;totalDesc+=cajasP;
          } else {
            invAct=invAct.map(function(x){return x.id===pal.id?Object.assign({},x,{cajas:cajasP-cajasRest}):x;});
            totalDesc+=cajasRest;cajasRest=0;
          }
        });
        if(cajasRest>0)errores.push((l.presentacion||"")+" "+(l.calidad||"")+": faltan "+cajasRest+" cjs");
      });
      nd[prod]=Object.assign({},nd[prod],{inventario:invAct,bajados:bajAct});
      guardar(nd);
      setResultado({ok:!errores.length,totalDesc:totalDesc,errores:errores});
      setPreview([]);setAbierto(false);
    });
  }

  var sinp={width:"100%",background:"rgba(0,0,0,0.3)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,padding:"7px 9px",color:"#fff",fontFamily:"system-ui",fontSize:13,outline:"none"};
  return(
    <div style={{marginBottom:12}}>
      {resultado&&(
        <div style={{background:resultado.ok?"rgba(34,197,94,0.08)":"rgba(245,158,11,0.08)",border:"1px solid "+(resultado.ok?"rgba(34,197,94,0.3)":"rgba(245,158,11,0.3)"),borderRadius:9,padding:"10px 13px",marginBottom:8}}>
          <div style={{fontSize:12,fontWeight:900,color:resultado.ok?"#22c55e":"#f59e0b",marginBottom:2}}>{resultado.ok?"Descuento completado":"Descuento parcial"}</div>
          <div style={{fontSize:12,color:"#aabbcc"}}>{resultado.totalDesc} cajas descontadas del inventario (FIFO — pallets mas viejos primero)</div>
          {resultado.errores.length>0&&resultado.errores.map(function(e,i){return<div key={i} style={{fontSize:11,color:"#f59e0b",marginTop:3}}>⚠ {e}</div>;})}
          <button onClick={function(){setResultado(null);}} style={{marginTop:6,padding:"3px 10px",background:"transparent",border:"1px solid rgba(255,255,255,0.1)",borderRadius:5,color:"#8899aa",fontSize:11,cursor:"pointer",fontFamily:"system-ui"}}>Cerrar</button>
        </div>
      )}
      {msg&&!abierto&&<div style={{background:"rgba(245,158,11,0.08)",border:"1px solid rgba(245,158,11,0.2)",borderRadius:8,padding:"8px 12px",marginBottom:8,fontSize:12,color:"#f59e0b",fontWeight:700}}>{msg}</div>}
      {!abierto
        ?<button onClick={function(){setAbierto(true);cargarEmbarques();}} style={{width:"100%",padding:"10px",background:"rgba(96,165,250,0.08)",border:"1px solid rgba(96,165,250,0.25)",borderRadius:9,color:"#60a5fa",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"system-ui"}}>Jalar embarques y descontar inventario</button>
        :<div style={{background:"rgba(0,10,30,0.6)",border:"1px solid rgba(96,165,250,0.3)",borderRadius:10,padding:"12px",marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:12,fontWeight:900,color:"#60a5fa",letterSpacing:1}}>DESCUENTO FIFO — {prod}</div>
            <button onClick={function(){setAbierto(false);setPreview([]);setMsg(null);}} style={{background:"transparent",border:"none",color:"#8899aa",fontSize:18,cursor:"pointer"}}>✕</button>
          </div>
          <div style={{marginBottom:8}}>
            <div style={{fontSize:9,color:"#8899aa",fontWeight:700,marginBottom:3,textTransform:"uppercase"}}>Fecha del embarque</div>
            <div style={{display:"flex",gap:6}}>
              <input style={sinp} type="date" value={fecha} onChange={function(e){setFecha(e.target.value);}}/>
              <button onClick={cargarEmbarques} style={{padding:"7px 12px",background:"rgba(96,165,250,0.1)",border:"1px solid rgba(96,165,250,0.3)",borderRadius:6,color:"#60a5fa",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"system-ui",whiteSpace:"nowrap"}}>{loading?"...":"Buscar"}</button>
            </div>
          </div>
          {msg&&<div style={{fontSize:11,color:"#f59e0b",marginBottom:8}}>{msg}</div>}
          {preview.length>0&&(
            <div>
              <div style={{fontSize:9,color:"#8899aa",fontWeight:700,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Vista previa — pallets a descontar (mas viejos primero):</div>
              {preview.map(function(item,i){
                var l=item.linea;
                return(
                  <div key={i} style={{background:"rgba(0,0,0,0.25)",border:"1px solid rgba(96,165,250,0.12)",borderRadius:8,padding:"9px 11px",marginBottom:7}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                      <div style={{fontSize:13,fontWeight:900,color:"#fff"}}>{l.producto} · {l.presentacion} · {l.calidad}</div>
                      <div style={{fontSize:15,fontWeight:900,color:"#60a5fa",fontFamily:"Georgia,serif"}}>{l.cajas} cjs</div>
                    </div>
                    <div style={{fontSize:10,color:"#8899aa",marginBottom:5}}>Cliente: {l.cliente||"—"}{l.manifiesto?" · Man:"+l.manifiesto:""}</div>
                    {item.paletsAfectados.map(function(pa,j){return(
                      <div key={j} style={{display:"flex",justifyContent:"space-between",background:"rgba(34,197,94,0.05)",border:"1px solid rgba(34,197,94,0.1)",borderRadius:5,padding:"4px 8px",marginBottom:3}}>
                        <div style={{fontSize:10,color:"#22c55e"}}>{pa.folio||"Pallet"} · {pa.rancho} · {pa.fecha}</div>
                        <div style={{fontSize:10,fontWeight:900,color:"#22c55e"}}>{pa.cajas} cjs {!pa.completo?"(parcial)":""}</div>
                      </div>
                    );})}
                    {item.cajasFaltantes>0&&<div style={{fontSize:10,color:"#f59e0b",marginTop:3}}>⚠ Faltan {item.cajasFaltantes} cjs en inventario</div>}
                  </div>
                );
              })}
              <button onClick={ejecutarDescuento} style={{width:"100%",marginTop:4,padding:"12px",background:"rgba(96,165,250,0.15)",border:"2px solid rgba(96,165,250,0.5)",borderRadius:9,color:"#60a5fa",fontSize:14,fontWeight:900,cursor:"pointer",fontFamily:"system-ui"}}>Confirmar descuento</button>
            </div>
          )}
        </div>
      }
    </div>
  );
}

}
function diasDesde(fecha){
  try{
    var parts=fecha.split("/"); var d=parseInt(parts[0]); var m=parseInt(parts[1]); var y=parseInt(parts[2]);
    return Math.floor((new Date()-new Date(y,m-1,d))/86400000);
  }catch(e){ return 0; }
}

function InvPorFecha(props){
  var inventario=props.inventario; var diasDesde=props.diasDesde; var DIAS_ALARMA=props.DIAS_ALARMA;
  var col=props.col; var setModalBaja=props.setModalBaja;

function PedsCerrados(props){
  var pedidosCerrados=props.pedidosCerrados; var prod=props.prod; var registros=props.registros;
  var col=props.col; var setPedidosCerrados=props.setPedidosCerrados; var fbSet=props.fbSet; var PED_CERR_KEY=props.PED_CERR_KEY;
  var fechaHoyStr=props.fechaHoyStr||"";
  var pedsCerr=Array.isArray(pedidosCerrados[prod])?pedidosCerrados[prod]:[];
  var stateAbierto=React.useState(null); var abierto=stateAbierto[0]; var setAbierto=stateAbierto[1];
  var sFecha=React.useState(""); var filtFecha=sFecha[0]; var setFiltFecha=sFecha[1];
  if(!pedsCerr.length) return <div style={{textAlign:"center",padding:30,color:"#8899aa",fontSize:12}}>Sin pedidos cerrados</div>;
  var pedsFilt=filtFecha?pedsCerr.filter(function(p){return(p.fechaCierre||"").indexOf(filtFecha)>=0;}):pedsCerr;
  var sinpSt={background:"rgba(0,0,0,0.3)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,padding:"6px 8px",color:"#fff",fontFamily:"system-ui",fontSize:12,outline:"none"};
  return (
    <div>
      <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"center"}}>
        <div style={{fontSize:9,color:"#8899aa",fontWeight:700,textTransform:"uppercase",whiteSpace:"nowrap"}}>Filtrar fecha:</div>
        <input style={Object.assign({},sinpSt,{flex:1})} placeholder={"Ej: "+fechaHoyStr} value={filtFecha} onChange={function(e){setFiltFecha(e.target.value);}}/>
        {filtFecha&&<button onClick={function(){setFiltFecha("");}} style={{padding:"4px 8px",background:"transparent",border:"1px solid rgba(239,68,68,0.3)",borderRadius:5,color:"#ef4444",fontSize:11,cursor:"pointer",fontFamily:"system-ui"}}>X</button>}
      </div>
      {pedsFilt.length===0&&<div style={{textAlign:"center",padding:20,color:"#8899aa",fontSize:12}}>Sin resultados</div>}
      {pedsFilt.map(function(ped){
        // Calcular cajas hechas: coincidir por cliente Y presentacion si existe
        var regsMatch=registros.filter(function(r){
          if(r.cliente!==ped.cliente)return false;
          if(ped.presentacion&&r.presentacion&&r.presentacion!==ped.presentacion)return false;
          return true;
        });
        var cajasHechas=regsMatch.reduce(function(s,r){return s+(parseInt(r.cajas)||0);},0);
        var pedCajas=parseInt(ped.cajas)||1;
        var pct=Math.min(100,Math.round(cajasHechas/pedCajas*100));
        var completo=cajasHechas>=pedCajas;
        var isAbierto=abierto===ped.id;
        // Desglose por rancho+malla
        var desglose={};
        regsMatch.forEach(function(r){
          var k=(r.rancho||"?")+"/M"+(r.malla||"?");
          if(!desglose[k])desglose[k]=0;
          desglose[k]+=(parseInt(r.cajas)||0);
        });
        return (
          <div key={ped.id} style={{marginBottom:8}}>
            <div onClick={function(){setAbierto(isAbierto?null:ped.id);}}
              style={{background:"rgba(0,0,0,0.25)",border:"1px solid "+(isAbierto?col+"44":"rgba(255,255,255,0.07)"),borderRadius:isAbierto?"8px 8px 0 0":"8px",padding:"10px 12px",cursor:"pointer"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <div style={{fontSize:13,fontWeight:700,color:"#ffffff"}}>{ped.cliente}</div>
                <div style={{fontSize:11,color:"#8899aa"}}>{ped.fechaCierre}</div>
              </div>
              {ped.presentacion&&<div style={{fontSize:12,color:"#b0bec5",marginBottom:5}}>{ped.presentacion}</div>}
              <div style={{height:8,background:"rgba(255,255,255,0.07)",borderRadius:4,overflow:"hidden",marginBottom:4}}>
                <div style={{height:"100%",width:pct+"%",background:completo?"#22c55e":col,borderRadius:4}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11}}>
                <span style={{color:"#b0bec5"}}>{cajasHechas} / {ped.cajas} cajas ({pct}%)</span>
                <span style={{color:completo?"#22c55e":"#f59e0b",fontWeight:700}}>{completo?"Completado":"Parcial"}</span>
              </div>
              <div style={{fontSize:9,color:"#555",marginTop:3,textAlign:"right"}}>Toca para ver desglose</div>
            </div>
            {isAbierto&&(
              <div style={{background:"rgba(0,0,0,0.35)",border:"1px solid "+col+"33",borderTop:"none",borderRadius:"0 0 8px 8px",padding:"12px"}}>
                <div style={{fontSize:9,fontWeight:900,letterSpacing:2,color:col,opacity:0.7,marginBottom:8}}>DESGLOSE POR RANCHO Y MALLA</div>
                {Object.keys(desglose).length===0?(
                  <div style={{fontSize:11,color:"#555"}}>Sin registros asociados a este pedido</div>
                ):(
                  Object.keys(desglose).map(function(k){return(
                    <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                      <span style={{fontSize:12,color:"#b0bec5"}}>{k}</span>
                      <span style={{fontSize:13,fontWeight:700,color:col,fontFamily:"Georgia,serif"}}>{desglose[k]} cajas</span>
                    </div>
                  );})
                )}
                <div style={{display:"flex",justifyContent:"space-between",marginTop:8,paddingTop:6,borderTop:"1px solid rgba(255,255,255,0.08)"}}>
                  <span style={{fontSize:11,color:"#8899aa"}}>Total registrado</span>
                  <span style={{fontSize:14,fontWeight:900,color:col,fontFamily:"Georgia,serif"}}>{cajasHechas} cajas</span>
                </div>
              </div>
            )}
          </div>
        );
      })}
      <button onClick={async function(){
        var pc2={}; Object.keys(pedidosCerrados).forEach(function(k){pc2[k]=pedidosCerrados[k];}); pc2[prod]=[];
        setPedidosCerrados(pc2); await fbSet(PED_CERR_KEY,pc2);
      }} style={{width:"100%",padding:"8px",marginTop:8,background:"transparent",border:"1px solid rgba(239,68,68,0.3)",borderRadius:6,color:"#ef4444",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"system-ui"}}>Borrar pedidos cerrados</button>
    </div>
  );
}

      </div>
    )}

    {/* MODAL DESCONTAR INVENTARIO DE PEDIDO */}
    {itemDescontar&&(
      <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.92)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
        <div style={{background:"#0a1628",border:"2px solid rgba(96,165,250,0.4)",borderRadius:14,padding:"20px",maxWidth:420,width:"100%",maxHeight:"90vh",overflowY:"auto"}}>
          <div style={{fontSize:15,fontWeight:900,color:"#60a5fa",marginBottom:4}}>Descontar del pedido</div>
          <div style={{fontSize:12,color:"#4a6a7a",marginBottom:14}}>
            {itemDescontar.cajas} cajas en inventario . {itemDescontar.rancho} . M{itemDescontar.malla}
          </div>
          <div style={{fontSize:11,color:"#8899aa",marginBottom:10}}>Selecciona el pedido activo al que vas a asignar este pallet:</div>
          {(pedidosActivos||[]).length===0
            ?<div style={{background:"rgba(245,158,11,0.08)",border:"1px solid rgba(245,158,11,0.2)",borderRadius:8,padding:"12px",fontSize:12,color:"#f59e0b",textAlign:"center",marginBottom:14}}>No hay pedidos activos para {prod}.<br/>Crea un pedido primero en la pestaña Pedidos.</div>
            :(pedidosActivos||[]).map(function(ped){
              var cajasPed=parseInt(ped.cajas)||0;
              return(
                <div key={ped.id} style={{background:"rgba(0,0,0,0.3)",border:"1px solid rgba(96,165,250,0.2)",borderRadius:9,padding:"10px 12px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:700,color:"#fff"}}>{ped.cliente}</div>
                    <div style={{fontSize:11,color:"#8899aa"}}>{ped.presentacion} . {cajasPed} cajas</div>
                  </div>
                  <button onClick={function(){
                    var iSnap=itemDescontar;var pedSnap=ped;
                    requerirPin(function(){
                      // Mover item de inventario a registros con cliente del pedido
                      var nd=Object.assign({},datos);
                      var pN=prod;
                      var invActual=(nd[pN]&&nd[pN].inventario)||[];
                      var regActual=(nd[pN]&&nd[pN].registros)||[];
                      // Quitar del inventario
                      nd[pN]=Object.assign({},nd[pN],{
                        inventario:invActual.filter(function(x){return x.id!==iSnap.id;}),
                        registros:regActual.concat([Object.assign({},iSnap,{cliente:pedSnap.cliente,presentacion:pedSnap.presentacion||iSnap.presentacion,_descontadoPedido:pedSnap.id})])
                      });
                      guardar(nd);
                      setItemDescontar(null);
                    });
                  }} style={{padding:"7px 14px",background:"rgba(96,165,250,0.15)",border:"2px solid rgba(96,165,250,0.4)",borderRadius:8,color:"#60a5fa",fontFamily:"system-ui",fontSize:12,fontWeight:900,cursor:"pointer"}}>Descontar</button>
                </div>
              );
            })
          }
          <button onClick={function(){setItemDescontar(null);}}
            style={{width:"100%",padding:"10px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#6b7280",fontFamily:"system-ui",fontSize:13,fontWeight:700,cursor:"pointer",marginTop:8}}>Cancelar</button>
        </div>
      </div>
    )}

    {/* MODAL EDITAR ITEM DE HISTORIAL */}
    {editHistItem&&(
      <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.92)",zIndex:9999,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:12,overflowY:"auto"}}>
        <div style={{background:"#0a1628",border:"2px solid rgba(167,139,250,0.4)",borderRadius:14,padding:"18px",maxWidth:440,width:"100%",marginTop:20}}>
          <div style={{fontSize:15,fontWeight:900,color:"#a78bfa",marginBottom:4}}>Editar registro del historial</div>
          <div style={{fontSize:11,color:"#4a6a7a",marginBottom:14}}>{editHistItem.folio||""} . {editHistItem.fecha||""}</div>
          {!editHistAuth?(
            <div>
              <div style={{fontSize:12,color:"#8899aa",marginBottom:8}}>PIN para editar:</div>
              <div style={{display:"flex",gap:8}}>
                <input type="password" placeholder="PIN" value={editHistPin}
                  onChange={function(e){setEditHistPin(e.target.value);setEditHistPinErr(false);}}
                  onKeyDown={function(e){if(e.key==="Enter"){if(editHistPin===PIN_PROD){setEditHistAuth(true);}else{setEditHistPinErr(true);setEditHistPin("");}}}}
                  style={{flex:1,background:"rgba(0,0,0,0.5)",border:"2px solid rgba(167,139,250,0.3)",borderRadius:8,padding:"10px",color:"#fff",fontFamily:"system-ui",fontSize:18,fontWeight:800,textAlign:"center",outline:"none"}}/>
                <button onClick={function(){if(editHistPin===PIN_PROD){setEditHistAuth(true);}else{setEditHistPinErr(true);setEditHistPin("");}}}
                  style={{padding:"10px 16px",background:"rgba(167,139,250,0.15)",border:"2px solid rgba(167,139,250,0.4)",borderRadius:8,color:"#a78bfa",fontFamily:"system-ui",fontSize:13,fontWeight:900,cursor:"pointer"}}>OK</button>
              </div>
              {editHistPinErr&&<div style={{color:"#ef4444",fontSize:12,marginTop:6}}>PIN incorrecto</div>}
              <button onClick={function(){setEditHistItem(null);setEditHistAuth(false);setEditHistPin("");}}
                style={{width:"100%",marginTop:12,padding:"9px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#6b7280",fontFamily:"system-ui",fontSize:12,fontWeight:700,cursor:"pointer"}}>Cancelar</button>
            </div>
          ):(
            <div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
                {[["cliente","Cliente","text"],["calidad","Calidad","text"],["presentacion","Presentacion","text"],["cajas","Cajas","number"],["rancho","Rancho","text"],["malla","Malla","text"],["fecha","Fecha","date"]].map(function(f){return(
                  <div key={f[0]}>
                    <div style={{fontSize:9,color:"#4a6a7a",fontWeight:900,letterSpacing:1.5,textTransform:"uppercase",marginBottom:3}}>{f[1]}</div>
                    <input type={f[2]} value={editHistItem[f[0]]||""}
                      onChange={function(e){var u=Object.assign({},editHistItem);u[f[0]]=e.target.value;setEditHistItem(u);}}
                      style={{width:"100%",background:"rgba(0,0,0,0.4)",border:"1px solid rgba(167,139,250,0.3)",borderRadius:6,padding:"7px 8px",color:"#e8eaf0",fontFamily:"system-ui",fontSize:13,fontWeight:700,outline:"none"}}/>
                  </div>
                );})}
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={function(){setEditHistItem(null);setEditHistAuth(false);}}
                  style={{flex:1,padding:"9px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#6b7280",fontFamily:"system-ui",fontSize:12,fontWeight:700,cursor:"pointer"}}>Cancelar</button>
                <button onClick={function(){
                  var item=Object.assign({},editHistItem,{cajas:parseInt(editHistItem.cajas)||editHistItem.cajas});
                  var nh=historial.map(function(x){return x.id===item.id?item:x;});
                  setHistorial(nh);
                  try{fetch(FB_URL+"/prod-hist-v3/h"+item.id+".json",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(item)}).catch(function(){});}catch(e){}
                  setEditHistItem(null);setEditHistAuth(false);
                }} style={{flex:2,padding:"9px",background:"rgba(167,139,250,0.18)",border:"2px solid rgba(167,139,250,0.5)",borderRadius:8,color:"#a78bfa",fontFamily:"system-ui",fontSize:13,fontWeight:900,cursor:"pointer"}}>Guardar cambios</button>
              </div>
            </div>
          )}
        </div>
      </div>
    )}

    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
